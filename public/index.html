<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Transaction Rocket 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc="";</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  /* ── Transaction Rocket Design System ── */
  --bg:#F5F6FA;--surface:#FFFFFF;--surface2:#F8F9FC;--surface3:#F0F2F7;
  --border:#EAECF0;--border2:#D0D5DD;
  --text1:#101828;--text2:#344054;--text3:#667085;--text4:#98A2B3;
  /* semantic aliases for legacy code compat */
  --navy:#101828;--navy-mid:#1A2B3C;
  --white:#FFFFFF;--muted:#98A2B3;--slate:#667085;--slate2:#344054;
  --card:#FFFFFF;--card2:#F8F9FC;
  --bg2:#FFFFFF;--bg3:#F8F9FC;
  --b2:#EAECF0;--b3:#F5F6FA;
  --text:#101828;
  /* greens */
  --green:#027A48;--green-lt:#ECFDF3;--green-bd:#A9EFC5;
  /* ambers */
  --amber:#B54708;--amber-lt:#FFFAEB;--amber-bd:#FEC84B;
  /* reds/coral */
  --red:#B42318;--red2:#912018;--red-lt:#FEF3F2;--red-bd:#FECDCA;
  --coral:#B42318;--coral-lt:#FEF3F2;
  /* blues */
  --sky:#1D4ED8;--sky-lt:#EFF6FF;--sky-mid:#BFDBFE;--sky2:#1D4ED8;
  /* misc accent */
  --gold:#B54708;--gold2:#93370D;--yellow:#B54708;--yellow-lt:#FFFAEB;
  --teal:#027A48;--teal-lt:#ECFDF3;
  --purple:#5B21B6;--purple-lt:#F5F3FF;
  /* shadows — light & subtle */
  --shadow:0 1px 2px rgba(16,24,40,.05),0 0 0 1px rgba(16,24,40,.04);
  --shadow-md:0 4px 8px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  --shadow-lg:0 12px 32px rgba(16,24,40,.08),0 4px 8px rgba(16,24,40,.04);
  --glow:rgba(180,35,24,.12);
  --green-lt2:#ECFDF3;
  --blue:#1D4ED8;--blue-bg:#EFF6FF;--blue-bd:#BFDBFE;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;overflow-x:hidden;font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--surface2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;box-shadow:none}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;background:var(--bg)}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.logo-brand{font-family:'Sora',sans-serif;font-size:13.5px;font-weight:600;color:var(--text1);letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.logo-brand-icon{width:26px;height:26px;background:var(--text1);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.logo-sub{font-size:10px;letter-spacing:.4px;color:var(--text4);margin-top:3px;padding-left:34px}
.nav{flex:1;padding:8px}
.ns{padding:12px 8px 4px;font-size:9.5px;letter-spacing:1.1px;text-transform:uppercase;color:var(--text4);font-weight:600}
.ni{display:flex;align-items:center;gap:9px;padding:7px 8px;cursor:pointer;transition:all .12s;border-radius:7px;font-size:12.5px;color:var(--text3);margin-bottom:1px}
.ni:hover{background:var(--surface2);color:var(--text2)}
.ni.active{background:var(--surface2);color:var(--text1);font-weight:500}
.ni-icon{width:16px;text-align:center;font-size:13px;flex-shrink:0;color:var(--text4)}
.ni.active .ni-icon{color:var(--text1)}
.nbadge{margin-left:auto;background:var(--text1);color:#fff;font-size:9px;padding:1px 6px;border-radius:100px;font-weight:600;font-family:'JetBrains Mono',monospace}
.nbadge.warn{background:var(--amber)}
.ncount{margin-left:auto;background:var(--surface2);color:var(--text3);font-size:9px;padding:1px 5px;border-radius:100px;border:1px solid var(--border)}
.sb-btn{margin:10px 8px;padding:8px;background:var(--text1);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;width:calc(100% - 16px);transition:all .15s}
.sb-btn:hover{background:#374151}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:52px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:12px}
.topbar-title{font-family:'Sora',sans-serif;font-size:13px;font-weight:600;color:var(--text1)}
.topbar-sub{font-size:10.5px;color:var(--text4);margin-top:1px}

/* ── TOPBAR QUICK LINKS ── */
.topbar-ql{display:flex;align-items:center;gap:5px;flex:1;justify-content:center}
.topbar-ql-sep{width:1px;height:16px;background:var(--border)}
.topbar-ql-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;text-decoration:none;transition:all .12s;white-space:nowrap;font-family:'Sora',sans-serif}
.topbar-ql-btn:hover{border-color:var(--border2);background:var(--surface2);color:var(--text1)}
.topbar-ql-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}

.content{padding:20px 22px;flex:1}

/* ── AUTOSAVE TOAST ── */
.autosave-toast,.autosave-badge{position:fixed;bottom:20px;right:20px;background:var(--text1);color:#fff;font-size:11px;font-weight:600;padding:8px 14px;border-radius:100px;box-shadow:var(--shadow-md);opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;display:flex;align-items:center;gap:6px}
.autosave-toast.show,.autosave-badge.show{opacity:1}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'Sora',sans-serif;font-size:12px;font-weight:500;transition:all .12s}
.bp{background:var(--text1);color:#fff}.bp:hover{background:#374151}
.bg{background:transparent;color:var(--text3);border:1px solid var(--border)}.bg:hover{background:var(--surface2);color:var(--text2);border-color:var(--border2)}
.bgold{background:var(--text1);color:#fff;font-weight:600}.bgold:hover{background:#374151}
.bdanger{background:var(--red-lt);color:var(--red);border:1px solid var(--red-bd)}.bdanger:hover{background:#FEE4E2}
.bsm{padding:5px 10px;font-size:11px}.bxs{padding:2px 7px;font-size:10.5px;border-radius:5px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}
.ch{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.cb{padding:15px}
.ct{font-size:13px;font-weight:600;color:var(--text1)}

/* ── STAT CARDS ── */
.sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 10px 10px}
.sr::after{background:var(--red-bd)}.sg::after{background:var(--amber-bd)}.sgg::after{background:var(--green-bd)}.sb::after{background:var(--sky-mid)}
.sl{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--text4);font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.sl-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
.sr .sl-icon{background:var(--red-lt);color:var(--red)}
.sg .sl-icon{background:var(--amber-lt);color:var(--amber)}
.sgg .sl-icon{background:var(--green-lt);color:var(--green)}
.sb .sl-icon{background:var(--sky-lt);color:var(--sky)}
.sv{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;margin:0 0 6px;color:var(--text1);letter-spacing:-1px;line-height:1}
.ss{font-size:10.5px;color:var(--text4);display:flex;align-items:center;gap:5px}
.ss-tag{font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:100px;border:1px solid transparent}
.ss-tag.g{background:var(--green-lt);color:var(--green);border-color:var(--green-bd)}
.ss-tag.r{background:var(--red-lt);color:var(--red);border-color:var(--red-bd)}
.ss-tag.a{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-bd)}
.stats4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}

/* ── QUICK VIEWS ── */
.quick-views-row{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.quick-views-label{font-size:10px;font-weight:600;color:var(--text4);letter-spacing:.5px;text-transform:uppercase;margin-right:4px}

/* ── DEAL GRID ── */
.dg{display:grid;gap:10px}

/* ── DEAL CARDS ── */
.dc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 16px;cursor:pointer;transition:all .12s;display:flex;gap:11px;box-shadow:var(--shadow)}
.dc:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-1px);box-shadow:var(--shadow-md)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:9.5px;font-weight:600;border:1px solid transparent}
.ba{background:var(--green-lt);color:var(--green);border-color:var(--green-bd)}
.bpend{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-bd)}
.bcl{background:var(--surface2);color:var(--text3);border-color:var(--border)}
.bauc{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-bd)}
.blist{background:var(--sky-lt);color:var(--sky);border-color:var(--sky-mid)}
.bbuy{background:var(--green-lt);color:var(--green);border-color:var(--green-bd)}
.bph{background:var(--surface2);color:var(--text3);border-color:var(--border)}
.dbd{font-size:10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 7px;color:var(--text2);white-space:nowrap}
.dbd.urg{border-color:var(--red-bd);color:var(--red);background:var(--red-lt)}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(16,24,40,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(4px);animation:fi .15s}
.md{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:su .2s}
.mdlg{max-width:820px}.mdxl{max-width:1000px}
.mh{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:2}
.mt2{font-family:'Sora',sans-serif;font-size:14px;font-weight:600;color:var(--text1)}
.mb2{padding:18px}
.mf{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--surface2)}
.xb{background:none;border:none;color:var(--text4);cursor:pointer;font-size:16px;padding:2px;transition:color .12s;line-height:1}.xb:hover{color:var(--text1)}

/* ── FORMS ── */
.fg{margin-bottom:12px}
.fl{display:block;font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--text3);margin-bottom:4px;text-transform:uppercase}
.fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text1);font-family:'Sora',sans-serif;font-size:12.5px;transition:all .12s;outline:none}
.fi:focus{border-color:var(--border2);background:var(--surface);box-shadow:0 0 0 3px rgba(16,24,40,.06)}
.fi::placeholder{color:var(--text4)}
select.fi option{background:var(--surface);color:var(--text1)}
textarea.fi{resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}

/* ── TRANSACTION DETAIL ── */
.txnh{padding:20px;border-bottom:1px solid var(--border);background:var(--text1)}
.pbar{display:flex;overflow-x:auto;margin-top:14px;gap:4px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
.ps{flex-shrink:0;padding:4px 12px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .12s;border-radius:100px;color:rgba(255,255,255,.4);border:1px solid transparent}
.ps:hover{color:rgba(255,255,255,.75)}.ps.psa{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.2)}.ps.psd{color:rgba(255,255,255,.6)}

/* ── KEY DATES BAR ── */
.kd{display:flex;flex-wrap:wrap;background:var(--surface2);border-bottom:1px solid var(--border)}
.kdi{padding:10px 16px;border-right:1px solid var(--border);min-width:110px}
.kdl{font-size:9px;letter-spacing:.7px;text-transform:uppercase;color:var(--text4);font-weight:600;margin-bottom:2px}
.kdv{font-size:12px;font-weight:500;color:var(--text1);margin-top:2px}
.kdv.urg{color:var(--red)}.kdv.soon{color:var(--amber)}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;background:var(--surface)}
.tab{padding:10px 10px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text4);border-bottom:1.5px solid transparent;transition:all .12s;margin-bottom:-1px}
.tab:hover{color:var(--text2)}.tab.active{color:var(--text1);border-bottom-color:var(--text1);font-weight:600}

/* ── CHECKLIST ── */
.ci{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;transition:background .1s;border-bottom:1px solid var(--border)}
.ci:hover{background:var(--surface2)}
.cb2{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .12s;font-size:9px;font-weight:700}
.cb2.ck{background:var(--text1);border-color:var(--text1);color:#fff}
.clbl{flex:1;font-size:12px;color:var(--text2)}
.cdone{text-decoration:line-through;color:var(--text4)}
.cmeta{display:flex;gap:6px;margin-top:3px;align-items:center;flex-wrap:wrap}
.dtag{font-size:9.5px;padding:2px 6px;border-radius:4px;font-weight:600;border:1px solid transparent}
.dok{background:var(--green-lt);color:var(--green);border-color:var(--green-bd)}.dsn{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-bd)}.dov{background:var(--red-lt);color:var(--red);border-color:var(--red-bd)}
.pg{margin-bottom:10px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.pgh{display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--surface2);cursor:pointer;transition:background .12s}
.pgh:hover{background:var(--surface3)}

/* ── PROGRESS BARS ── */
.pw{height:3px;background:var(--border);border-radius:100px;overflow:hidden;margin-top:3px}
.pf{height:3px;border-radius:100px;background:var(--text1);transition:width .3s ease}
.progress-bar-wrap{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:4px;border:1px solid var(--border)}
.progress-bar-fill{height:100%;border-radius:3px;background:var(--text1);transition:width .5s ease}

/* ── CONTACTS ── */
.contact-card2{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all .12s;margin-bottom:9px;display:flex;gap:12px;box-shadow:var(--shadow)}
.contact-card2:hover{border-color:var(--border2);background:var(--surface2)}
.contact-card2.sel{border-color:var(--border2);box-shadow:0 0 0 3px rgba(16,24,40,.06)}
.av{width:38px;height:38px;border-radius:10px;background:var(--text1);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:#fff;flex-shrink:0}
.sch{font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:100px;border:1px solid transparent}
.sh{background:var(--green-lt);color:var(--green);border-color:var(--green-bd)}.sm{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-bd)}.sl2{background:var(--red-lt);color:var(--red);border-color:var(--red-bd)}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cdh{text-align:center;padding:7px 3px;font-size:9.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--text4);font-weight:600}
.cday{min-height:80px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px;cursor:pointer;transition:all .12s}
.cday:hover{background:var(--surface2);border-color:var(--border2)}.cday.today{border-color:var(--text1);background:var(--surface)}.cday.om{opacity:.35}
.cdn{font-size:11px;font-weight:600;color:var(--text4);margin-bottom:2px}
.cday.today .cdn{color:var(--text1);font-weight:700}
.cev{font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.er{background:var(--red-lt);color:var(--red)}.ego{background:var(--amber-lt);color:var(--amber)}
.eb{background:var(--sky-lt);color:var(--sky)}.eg{background:var(--green-lt);color:var(--green)}.ep{background:var(--purple-lt);color:var(--purple)}

/* ── TASKS ── */
.tr2{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;background:var(--surface);transition:all .12s;box-shadow:var(--shadow)}
.tr2:hover{border-color:var(--border2);background:var(--surface2)}
.tbar{width:3px;height:28px;border-radius:2px;flex-shrink:0}
.tbh{background:var(--red)}.tbm{background:var(--amber)}.tbl{background:var(--green)}.tbn{background:var(--text4)}

/* ── DOCUMENTS ── */
.doc-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;display:flex;gap:12px;align-items:flex-start;margin-bottom:9px;cursor:pointer;transition:all .12s;box-shadow:var(--shadow)}
.doc-card:hover{border-color:var(--border2);background:var(--surface2)}
.doc-icon{width:40px;height:46px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;border:1px solid var(--border)}

/* ── USERS / SETTINGS ── */
.user-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;background:var(--surface);transition:all .12s;box-shadow:var(--shadow)}
.user-row:hover{background:var(--surface2)}
.role-chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:.4px;border:1px solid transparent}
.role-admin{background:var(--red-lt);color:var(--red);border-color:var(--red-bd)}
.role-manager{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-bd)}
.role-agent{background:var(--sky-lt);color:var(--sky);border-color:var(--sky-mid)}
.role-marketing{background:var(--green-lt);color:var(--green);border-color:var(--green-bd)}
.perm-toggle{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--text2)}
.toggle-sw{width:36px;height:20px;background:var(--border);border-radius:10px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-sw.on{background:var(--text1)}
.toggle-knob{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle-sw.on .toggle-knob{left:19px}

/* ── MISC ── */
.empty{text-align:center;padding:40px 18px;color:var(--text4)}
.ei{font-size:2.2rem;margin-bottom:9px;opacity:.25}
.divider{height:1px;background:var(--border);margin:12px 0}
.sec-title{font-family:'Sora',sans-serif;font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px;color:var(--text1)}
.tag-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:10.5px;background:var(--surface);color:var(--text3);border:1px solid var(--border);margin:2px;cursor:pointer;transition:all .12s;font-weight:500}
.tag-pill:hover{border-color:var(--border2);color:var(--text2)}
.tag-pill.sel{background:var(--text1);color:#fff;border-color:var(--text1)}
.tag-pill .rm{opacity:.5;font-size:10px;margin-left:2px}.tag-pill .rm:hover{opacity:1}
.sw{position:relative;flex:1}.sw .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text4);pointer-events:none;font-size:12px}
.sw input{padding-left:30px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 12px;text-align:left;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--text4);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface2)}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
tr:hover td{background:var(--surface2)}
tr:last-child td{border-bottom:none}
.mktg-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;gap:9px;align-items:center;padding:8px 12px;border-radius:6px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.mktg-row:hover{background:var(--surface2)}
.mktg-hdr{color:var(--text4);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;font-weight:600;padding-bottom:3px}
.task-drag{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:center;gap:8px;cursor:grab;transition:all .12s}
.task-drag:hover{border-color:var(--border2);background:var(--surface2)}
.drag-handle{color:var(--text4);font-size:14px;cursor:grab}
.stab{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.stabitem{padding:5px 12px;border-radius:100px;font-size:11.5px;cursor:pointer;background:var(--surface);border:1px solid var(--border);color:var(--text3);transition:all .12s;font-weight:500}
.stabitem:hover{color:var(--text2);border-color:var(--border2)}.stabitem.active{background:var(--text1);color:#fff;border-color:var(--text1);font-weight:600}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.login-logo{text-align:center;margin-bottom:28px}
.login-brand{font-family:'Sora',sans-serif;font-size:20px;color:var(--text1);font-weight:600;display:flex;align-items:center;justify-content:center;gap:9px}
.login-brand-icon{width:32px;height:32px;background:var(--text1);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.login-sub{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text4);margin-top:6px}
.login-err{background:var(--red-lt);border:1px solid var(--red-bd);border-radius:8px;padding:10px;font-size:12px;color:var(--red);margin-bottom:14px;text-align:center}

/* ── ANIMATIONS ── */
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:500;transform:translateX(-100%);transition:transform .25s;box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:translateX(0)}
  .main{width:100vw}
  .content{padding:14px}
  .stats4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .g4{grid-template-columns:1fr 1fr}
  .mob-hbg{display:flex}
  .topbar{padding:0 14px;height:48px}
  .topbar-ql{display:none}
  .txnh{padding:14px}
  .kdi{min-width:100px}
  .md{margin:8px;max-height:calc(100vh - 16px)}
  .mdlg,.mdxl{max-width:calc(100vw - 16px)}
  table{font-size:11px}
  th,td{padding:7px 8px}
}
@media(min-width:769px){.mob-hbg{display:none}}
.mob-hbg{background:none;border:none;cursor:pointer;font-size:1.1rem;padding:4px;color:var(--text1);flex-shrink:0}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(16,24,40,.35);z-index:499;backdrop-filter:blur(2px)}
.mob-overlay.show{display:block}
</style>

const DEFAULT_GOALS = {

// Get goals for an agent — checks saved agentGoals first, falls back to defaults
function getAgentGoals(agentName) {
  const saved = (S.agentGoals || {})[agentName];
  return saved ? {...DEFAULT_GOALS, ...saved} : {...DEFAULT_GOALS};
}

// Team goals = sum of all agent goals
function getTeamGoals() {
  const agents = S.users.filter(u=>u.active && ['owner','operations','agent','admin_level'].includes(u.role));
  const totals = {...DEFAULT_GOALS};
  Object.keys(totals).forEach(k => totals[k] = 0);
  agents.forEach(u => {
    const g = getAgentGoals(u.name);
    Object.keys(totals).forEach(k => { totals[k] += (g[k] || 0); });
  });
  return totals;
}

// ── Password hashing (SHA-256 via Web Crypto API) ──────────────────
async function hashPassword(plain){
  if(!plain)return '';
  // If already hashed (64 hex chars), return as-is
  if(/^[a-f0-9]{64}$/i.test(plain))return plain;
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(plain));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function hashPasswordSync(plain){
  // Sync fallback for display — just checks if already hashed
  return /^[a-f0-9]{64}$/i.test(plain)?plain:null;
}
function isHashed(pw){ return /^[a-f0-9]{64}$/i.test(pw); }
function passwordStrength(pw){
  if(!pw)return{score:0,label:'',color:'var(--border2)',valid:false};
  let score=0;
  const hasUpper=/[A-Z]/.test(pw);
  const hasNum=/[0-9]/.test(pw);
  const hasSpecial=/[^A-Za-z0-9]/.test(pw);
  if(pw.length>=8)score++;if(pw.length>=12)score++;
  if(hasUpper)score++;if(hasNum)score++;if(hasSpecial)score++;
  // Must meet minimums to be valid
  const valid=pw.length>=8&&hasUpper&&hasNum;
  const hints=[];
  if(pw.length<8)hints.push('8+ chars');
  if(!hasUpper)hints.push('uppercase');
  if(!hasNum)hints.push('number');
  const levels=[
    {score:0,label:'',color:'var(--border2)',valid:false},
    {score:1,label:'Too weak'+( hints.length?' — need: '+hints.join(', '):''),color:'var(--red)',valid:false},
    {score:2,label:valid?'Fair':'Need: '+hints.join(', '),color:valid?'var(--amber)':'var(--red)',valid},
    {score:3,label:'Fair',color:'var(--amber)',valid:true},
    {score:4,label:'Good',color:'var(--green)',valid:true},
    {score:5,label:'Strong',color:'var(--green)',valid:true},
  ];
  return {...levels[Math.min(score,5)],valid};
}

async function notifyTeamSpace(message, types){
  // types = array of space types like ['team','closing'] or omit for all type='team'
  const targets = types || ['team'];

  for(const type of targets){
    const sp=spaces.find(s=>s.type===type&&s.url);

  if(targets.includes('team')&&S.teamChatWebhook&&!spaces.find(s=>s.type==='team'&&s.url)){
    await sendGChatMessage(S.teamChatWebhook, message);
  }
}

function addDateDays(dateStr, days) {
  if(!dateStr) return '';
  const d = new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function computeTaskDueDate(txn, task) {
  const override = txn.taskDueDates?.[task.id];
  if(override) return override;
  if(!task.dueRef || task.dueDays===undefined || !txn[task.dueRef]) return '';
  return addDateDays(txn[task.dueRef], task.dueDays||0);
}

function el(tag, props={}, children=[]) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if(k==='class') e.className=v;
    else if(k==='style') Object.assign(e.style,v);
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html') e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  (Array.isArray(children)?children:[children]).forEach(c => {
    if(c==null||c===false) return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
const btn = (lbl, cls, fn) => { const b=el('button',{'class':'btn '+cls}); b.innerHTML=lbl; b.onclick=fn; return b; };
function fld(label, key, val, cb, type='text', ph='') {
  const g=el('div',{'class':'fg'});
  g.appendChild(el('label',{'class':'fl'},label));
  const i=el('input',{'class':'fi','type':type,'placeholder':ph});
  i.value=val||''; i.addEventListener('input',e=>cb(key,e.target.value)); i.addEventListener('blur',()=>{if(typeof saveState==='function'){saveState();showAutosaveToast();}});
  g.appendChild(i); return g;
}
function sfld(label, key, val, opts, cb) {
  const g=el('div',{'class':'fg'});
  g.appendChild(el('label',{'class':'fl'},label));
  const s=el('select',{'class':'fi'});
  opts.forEach(([v,l])=>{ const o=el('option'); o.value=v; o.textContent=l||v; if(v===val)o.selected=true; s.appendChild(o); });
  s.onchange=e=>{cb(key,e.target.value);if(typeof saveState==='function'){saveState();showAutosaveToast();}};
  g.appendChild(s); return g;
}
function tfld(label, key, val, cb, rows=3) {
  const g=el('div',{'class':'fg'});
  g.appendChild(el('label',{'class':'fl'},label));
  const t=el('textarea',{'class':'fi'}); t.rows=rows; t.value=val||'';
  t.oninput=e=>cb(key,e.target.value); t.addEventListener('blur',()=>{if(typeof saveState==='function'){saveState();showAutosaveToast();}});
  g.appendChild(t); return g;
}
function modal(title, bodyFn, footerFn, size='') {
  const ov=el('div',{'class':'mo'}); const md=el('div',{'class':'md '+size});
  const mh=el('div',{'class':'mh'}); const mt=el('div',{'class':'mt2'},title);
  const xb=el('button',{'class':'xb'}); xb.textContent='✕';
  mh.appendChild(mt); mh.appendChild(xb);
  const mb=el('div',{'class':'mb2'}); bodyFn(mb);
  const close=()=>ov.remove();
  xb.onclick=close; ov.onclick=e=>{if(e.target===ov)close();};
  document.addEventListener('keydown',function h(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',h);}});
  md.appendChild(mh); md.appendChild(mb);
  if(footerFn){const mf=el('div',{'class':'mf'}); footerFn(mf); md.appendChild(mf);}
  ov.appendChild(md); document.body.appendChild(ov);
  return {ov,close};
}

function renderLogin() {

  card.appendChild(fld('Password','password','',(_,v)=>password=v,'password','••••••••'));

  const remCb=el('input',{'type':'checkbox','style':{accentColor:'var(--red)'}});

  const remLbl=el('label',{'style':{fontSize:'.78rem',color:'var(--text2)',cursor:'pointer'}});remLbl.textContent='Remember me for 2 weeks';
  remRow.appendChild(remCb);remRow.appendChild(remLbl);card.appendChild(remRow);
  const loginBtn=el('button',{'class':'sb-btn'});loginBtn.textContent='Sign In';
  loginBtn.onclick=()=>{
    // Send plain text — server hashes and compares
    loginBtn.disabled=true; loginBtn.textContent='Signing in...';
    fetch('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    }).then(async r=>{
      const data=await r.json();
      if(!r.ok){
        let msg = data.error || 'Invalid email or password.';
        if(data.attemptsRemaining !== undefined && data.attemptsRemaining > 0){
          msg += ` (${data.attemptsRemaining} attempt${data.attemptsRemaining!==1?'s':''} remaining)`;
        }
        errDiv.textContent = msg;
        errDiv.style.display='block';
        loginBtn.disabled=false; loginBtn.textContent='Sign In';
        return;
      }
      // Store JWT token then load state
      setToken(data.token);
      await loadAppState();
      S.currentUser = data.user;
      if(data.forcePasswordChange) S.currentUser._forcePasswordChange=true;
      render();
    }).catch(()=>{
      errDiv.textContent='Connection error. Please try again.';
      errDiv.style.display='block';
      loginBtn.disabled=false; loginBtn.textContent='Sign In';
    });
  };
  card.appendChild(loginBtn);
  wrap.appendChild(card);
  return wrap;
}

function renderDashboard() {
  const div=el('div',{'class':'content'});
  const active=S.transactions.filter(t=>t.status==='active');
  const closed=S.transactions.filter(t=>t.status==='closed');
  const closedVol=closed.reduce((s,t)=>s+Number((t.contractPrice||'').replace(/[^0-9.]/g,'')||0),0);
  const upcoming=[];
  active.forEach(txn=>{
    ['closingDate','emDue','inspectionDate','inspectionRRDue','appraisalDue','auctionDate'].filter(k=>txn[k]).forEach(k=>{
      const du=daysUntil(txn[k]);
      if(du!==null&&du>=0&&du<=14)upcoming.push({label:k.replace(/([A-Z])/g,' $1').trim(),date:txn[k],du,addr:txn.address.split(',')[0]});
    });
  });
  upcoming.sort((a,b)=>a.du-b.du);
  const urgTasks=[];
  active.forEach(txn=>{
    Object.values(S.templates[txn.type]||{}).flat().forEach(task=>{
      const dd=computeTaskDueDate(txn,task);
      if(!txn.completedTasks.includes(task.id)&&dd&&daysUntil(dd)<=3)
        urgTasks.push({...task,addr:txn.address.split(',')[0],dueDate:dd});
    });
  });
  urgTasks.sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
  const sg=el('div',{'class':'stats4'});
  const scIcons={sr:'⌂',sg:'$',sgg:'↗',sb:'!'};
  function sc(cls,l,v,s){
    const c=el('div',{'class':'sc '+cls});
    const iconKey=cls.trim().split(' ')[0];
    c.innerHTML=`<div class="sl">${l}<span class="sl-icon">${scIcons[iconKey]||'●'}</span></div><div class="sv">${v}</div><div class="ss">${s}</div>`;
    return c;
  }
  sg.appendChild(sc('sr','Active Deals',active.length,`${active.filter(t=>t.type==='auction').length} Auction · ${active.filter(t=>t.type==='traditional').length} Listing · ${active.filter(t=>t.type==='buyer').length} Buyer`));
  sg.appendChild(sc('sg','Closed Volume',closedVol?'$'+Math.round(closedVol/1000)+'K':'$0',closed.length+' closed'));
  sg.appendChild(sc('sgg','Tasks Due Soon',urgTasks.length,'within 3 days'));
  sg.appendChild(sc('sb','Contacts',S.contacts.length,S.contacts.filter(c=>cScore(c)===100).length+' complete'));
  div.appendChild(sg);
  const grid=el('div',{'style':{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'13px',marginBottom:'20px'}});
  // Deadlines card
  const dc=el('div',{'class':'card'});
  dc.innerHTML=`<div class="ch"><div class="ct">⚡ Upcoming Deadlines</div><span style="font-size:.7rem;color:var(--muted)">Next 14 days</span></div>`;
  if(!upcoming.length){dc.innerHTML+='<div class="empty"><div class="ei">🗓️</div><p>No upcoming deadlines 🎉</p></div>';}
  else upcoming.slice(0,7).forEach(u=>{
    const r=el('div',{'style':{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 15px',borderBottom:'1px solid rgba(255,255,255,.03)',cursor:'pointer'}});
    r.onclick=()=>setState({page:'calendar'});
    r.innerHTML=`<div><div style="font-size:.81rem;font-weight:500;color:var(--navy)">${u.label}</div><div style="font-size:.68rem;color:var(--muted)">${u.addr}</div></div><div style="text-align:right"><div style="font-size:.77rem;font-weight:600;color:${u.du<=3?'var(--red2)':u.du<=7?'var(--amber)':'var(--slate2)'}">${fmtD(u.date)}</div><div style="font-size:.63rem;color:var(--muted)">${u.du===0?'TODAY':u.du===1?'TOMORROW':u.du+'d'}</div></div>`;
    dc.appendChild(r);
  });
  grid.appendChild(dc);
  const tc=el('div',{'class':'card'});
  tc.innerHTML=`<div class="ch"><div class="ct">📋 Tasks Due Soon</div><span style="font-size:.7rem;color:var(--muted)">Due ≤ 3 days</span></div>`;
  if(!urgTasks.length){tc.innerHTML+='<div class="empty"><div class="ei">✅</div><p>No urgent tasks!</p></div>';}
  else urgTasks.slice(0,7).forEach(t=>{
    const r=el('div',{'style':{display:'flex',alignItems:'center',gap:'9px',padding:'8px 15px',borderBottom:'1px solid rgba(255,255,255,.03)'}});
    const du=daysUntil(t.dueDate);
    r.innerHTML=`<div style="width:4px;height:30px;border-radius:2px;background:${isOvr(t.dueDate)?'var(--red)':isUrg(t.dueDate)?'var(--amber)':'var(--green)'};flex-shrink:0"></div><div style="flex:1"><div style="font-size:.8rem;font-weight:500;color:var(--navy)">${t.task}</div><div style="font-size:.68rem;color:var(--muted)">${t.addr} · ${t.assignee}</div></div><div style="font-size:.73rem;font-weight:600;color:${isOvr(t.dueDate)?'var(--red2)':isUrg(t.dueDate)?'var(--amber)':'var(--slate2)'};">${isOvr(t.dueDate)?Math.abs(du)+'d over':du===0?'Today':du===1?'Tomorrow':du+'d'}</div>`;
    tc.appendChild(r);
  });
  grid.appendChild(tc);
  div.appendChild(grid);
  const st=el('div',{'class':'sec-title'},'🏠 Active Transactions');div.appendChild(st);
  const dg=el('div',{'class':'dg'});
  active.slice(0,6).forEach(txn=>dg.appendChild(mkDealCard(txn)));
  div.appendChild(dg);
  return div;
}

function mkDealCard(txn) {
  const tmpl=S.templates[txn.type]||{};
  const total=Object.values(tmpl).flat().length||1;
  const done=(txn.completedTasks||[]).length;
  const pct=Math.round(done/total*100);
  const c=el('div',{'class':'dc'});
  c.onclick=()=>setState({page:'transactions',txnFilter:txn.type,selectedTxnId:txn.id,selectedTxnTab:'checklist'});
  const left=el('div',{'style':{flex:'1'}});
  left.innerHTML=`<div style="font-weight:600;font-size:.88rem;color:var(--navy);margin-bottom:5px">${txn.address}</div>`;
  const tags=el('div',{'style':{display:'flex',gap:'4px',flexWrap:'wrap',marginBottom:'6px'}});
  const mkb=(cls,t)=>{const b=el('span',{'class':'badge '+cls});b.textContent=t;return b;};
  tags.appendChild(mkb(typeBadge(txn.type),typeLabel(txn.type)));
  tags.appendChild(mkb(txn.status==='closed'?'bcl':'ba',txn.status));
  tags.appendChild(mkb('bph',txn.phase));
  left.appendChild(tags);
  left.innerHTML+=`<div style="font-size:.72rem;color:var(--slate)">👤 ${(txn.agents||[]).join(', ')}${txn.client1Name?'  🤝 '+txn.client1Name:''}</div>`;
  const pw=el('div',{'style':{marginTop:'7px'}});
  pw.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);margin-bottom:3px"><span>Progress</span><span>${pct}%</span></div>`;
  const pb=el('div',{'class':'pw'});pb.appendChild(el('div',{'class':'pf','style':{width:pct+'%'}}));pw.appendChild(pb);left.appendChild(pw);
  const right=el('div',{'style':{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'5px',flexShrink:'0'}});
  if(txn.contractPrice){const p=el('div',{'style':{fontFamily:"'Sora',sans-serif",fontSize:'.98rem',fontWeight:'600',color:'var(--gold)'}});p.textContent=fmt$(txn.contractPrice);right.appendChild(p);}
  else if(txn.reserve){const p=el('div',{'style':{fontSize:'.82rem',fontWeight:'600',color:'var(--gold)'}});p.textContent=txn.reserve+' reserve';right.appendChild(p);}
  if(txn.closingDate||txn.type!=='auction'){
    const dw=el('div',{'style':{display:'flex',alignItems:'center',gap:'3px'}});
    const dl=el('div',{'class':'dbd'+(isUrg(txn.closingDate)||isOvr(txn.closingDate)?' urg':''),'style':{cursor:'pointer',userSelect:'none'}});
    dl.textContent='Close: '+fmtD(txn.closingDate);
    const di=el('input',{'type':'date','class':'fi','style':{display:'none',width:'120px',padding:'2px 6px',fontSize:'.68rem'}});
    di.value=txn.closingDate||'';
    dl.onclick=e=>{e.stopPropagation();dl.style.display='none';di.style.display='block';di.focus();};
    di.onblur=()=>{if(di.value!==txn.closingDate){updateTxn({...txn,closingDate:di.value});showAutosaveToast();}dl.style.display='block';di.style.display='none';};
    di.onclick=e=>e.stopPropagation();
    dw.appendChild(dl);dw.appendChild(di);right.appendChild(dw);
  }
  if(txn.auctionDate){const d=el('div',{'class':'dbd'+(isUrg(txn.auctionDate)?' urg':'')});d.textContent='Auction: '+fmtD(txn.auctionDate);right.appendChild(d);}
  c.appendChild(left);c.appendChild(right);return c;
}

function renderTxnList() {
  const div=el('div',{'class':'content'});
  const topRow=el('div',{'style':{display:'flex',gap:'9px',marginBottom:'15px',flexWrap:'wrap',alignItems:'center'}});
  const sw=el('div',{'class':'sw'});sw.innerHTML='<span class="si">🔍</span>';
  const sinp=el('input',{'class':'fi','placeholder':'Search address or client...'});
  sinp.value=S.txnSearch||''; sinp.oninput=e=>{S.txnSearch=e.target.value;renderMain();};
  sw.appendChild(sinp);topRow.appendChild(sw);
  const ts=el('select',{'class':'fi','style':{width:'auto'}});
  [['all','All Types'],['auction','Auction'],['traditional','Traditional'],['buyer','Buyer']].forEach(([v,l])=>{const o=el('option');o.value=v;o.textContent=l;if(v===S.txnFilter)o.selected=true;ts.appendChild(o);});
  ts.onchange=e=>setState({txnFilter:e.target.value,activeQuickView:null});topRow.appendChild(ts);
  const ss2=el('select',{'class':'fi','style':{width:'auto'}});
  [['active','Active'],['closed','Closed'],['all_status','All Status']].forEach(([v,l])=>{const o=el('option');o.value=v;o.textContent=l;if((v==='active'&&S.txnStatusFilter==='active')||(v===S.txnStatusFilter))o.selected=true;ss2.appendChild(o);});
  ss2.onchange=e=>setState({txnStatusFilter:e.target.value==='all_status'?'':e.target.value});topRow.appendChild(ss2);
  // Quick Views
  const qvRow=el('div',{'style':{display:'flex',gap:'5px',flexWrap:'wrap',marginBottom:'10px',alignItems:'center'}});
  const qvLbl=el('div',{'style':{fontSize:'.65rem',fontWeight:'700',letterSpacing:'1px',textTransform:'uppercase',color:'var(--text4)',marginRight:'3px'}});qvLbl.textContent='Quick Views:';qvRow.appendChild(qvLbl);
  const builtinViews=[
    {name:'Closing Soon',fn:t=>t.status==='active'&&t.closingDate&&daysUntil(t.closingDate)<=14&&daysUntil(t.closingDate)>=0},
    {name:'My Deals',fn:t=>t.agents?.includes(S.currentUser?.name)},
    {name:'Overdue Tasks',fn:t=>{const tmpl=S.templates[t.type]||{};return Object.values(tmpl).flat().some(task=>!t.completedTasks.includes(task.id)&&computeTaskDueDate(t,task)&&daysUntil(computeTaskDueDate(t,task))<0);}},
    {name:'Auction',fn:t=>t.type==='auction'&&t.status==='active'},
  ];
  [...builtinViews,...(S.savedViews||[])].forEach(view=>{
    const p=el('div',{'class':'tag-pill'+(S.activeQuickView===view.name?' sel':''),'style':{cursor:'pointer'}});
    p.textContent=view.name;
    p.onclick=()=>setState({activeQuickView:S.activeQuickView===view.name?null:view.name});
    qvRow.appendChild(p);
  });
  const saveViewBtn=btn('+ Save View','bg bxs',()=>{
    const name=prompt('Name for this saved view:');
    if(!name)return;
    S.savedViews=[...(S.savedViews||[]),{name,filter:S.txnFilter,status:S.txnStatusFilter,search:S.txnSearch}];
    saveState();render();
  });
  qvRow.appendChild(saveViewBtn);
  div.appendChild(topRow);div.appendChild(qvRow);
  const ss=el('select',{'class':'fi','style':{width:'auto'}});
  [['active','Active'],['closed','Closed'],['all','All']].forEach(([v,l])=>{const o=el('option');o.value=v;o.textContent=l;if(v===S.txnStatusFilter)o.selected=true;ss.appendChild(o);});
  ss.onchange=e=>setState({txnStatusFilter:e.target.value});topRow.appendChild(ss);
  topRow.appendChild(btn('+ New Transaction','bp',()=>showNewTxnModal()));
  div.appendChild(topRow);
  let txns=S.transactions.filter(t=>{
    // Quick view override
    if(S.activeQuickView){
      const qvFns={
        'Closing Soon':t=>t.status==='active'&&t.closingDate&&daysUntil(t.closingDate)<=14&&daysUntil(t.closingDate)>=0,
        'My Deals':t=>t.agents?.includes(S.currentUser?.name),
        'Overdue Tasks':t=>{const tmpl2=S.templates[t.type]||{};return Object.values(tmpl2).flat().some(task=>!t.completedTasks.includes(task.id)&&computeTaskDueDate(t,task)&&daysUntil(computeTaskDueDate(t,task))<0);},
        'Auction':t=>t.type==='auction'&&t.status==='active',
      };
      const savedV=(S.savedViews||[]).find(v=>v.name===S.activeQuickView);
      const fn=qvFns[S.activeQuickView];
      if(fn&&!fn(t))return false;
      if(savedV&&!fn){
        if(savedV.filter&&savedV.filter!=='all'&&t.type!==savedV.filter)return false;
        if(savedV.status&&savedV.status!=='all'&&t.status!==savedV.status)return false;
      }
    }
    if(S.txnStatusFilter!=='all'&&t.status!==S.txnStatusFilter)return false;
    if(S.txnFilter!=='all'&&t.type!==S.txnFilter)return false;
    const q=(S.txnSearch||'').toLowerCase();
    if(q&&!t.address.toLowerCase().includes(q)&&!(t.client1Name||'').toLowerCase().includes(q))return false;
    return true;
  });
  if(!txns.length){const e=el('div',{'class':'empty'});e.innerHTML='<div class="ei">🏠</div><p>No transactions found</p>';div.appendChild(e);}
  else{const dg=el('div',{'class':'dg'});txns.forEach(t=>dg.appendChild(mkDealCard(t)));div.appendChild(dg);}
  return div;
}

function renderChecklist(txn,tmpl,phases,curIdx){
  const div=el('div');
  phases.forEach((phase,pi)=>{
    const tasks=tmpl[phase]||[];
    const done=tasks.filter(t=>txn.completedTasks.includes(t.id)).length;
    const pct=tasks.length?Math.round(done/tasks.length*100):0;
    const isExp=S.expandedPhases[phase]!==false&&pi<=curIdx+1;
    const grp=el('div',{'class':'pg'});
    const hdr=el('div',{'class':'pgh'});
    hdr.innerHTML=`<span style="font-weight:700;font-size:.88rem;color:${pi<curIdx?'var(--green)':phase===txn.phase?'var(--red2)':'var(--muted)'}">${pi<curIdx?'✓':phase===txn.phase?'▶':'○'}</span><span style="font-weight:600;font-size:.83rem;color:${phase===txn.phase?'var(--navy)':'var(--text3)'};flex:1">${phase}</span><span style="font-size:.7rem;color:var(--muted);margin-right:7px">${done}/${tasks.length}</span><div class="pw" style="width:65px;height:4px"><div class="pf" style="width:${pct}%"></div></div><span style="color:var(--muted);font-size:.72rem;margin-left:6px">${isExp?'▲':'▼'}</span>`;
    hdr.onclick=()=>{S.expandedPhases[phase]=!isExp;renderMain();};
    grp.appendChild(hdr);
    if(isExp){
      tasks.forEach(task=>{
        const assignee=txn.taskAssignees?.[task.id]||task.assignee;
        const dueDate=computeTaskDueDate(txn,task);
        const isDone=txn.completedTasks.includes(task.id);
        const du=dueDate?daysUntil(dueDate):null;
        const row=el('div',{'class':'ci','style':{paddingLeft:'18px'}});
        const cb2=el('div',{'class':'cb2'+(isDone?' ck':'')});if(isDone)cb2.textContent='✓';
        cb2.onclick=()=>{
  const nowDone=!isDone;
  updateTxn({...txn,completedTasks:nowDone?[...txn.completedTasks,task.id]:txn.completedTasks.filter(id=>id!==task.id)});
  logActivity(txn.id,'task',nowDone?'Completed: '+task.task:'Uncompleted: '+task.task, task.phase||'');
};
        const mid=el('div',{'style':{flex:'1'}});
        const lbl=el('div',{'class':'clbl'+(isDone?' cdone':'')},task.task);
        const meta=el('div',{'class':'cmeta'});
        const asel=el('select',{'class':'fi','style':{width:'auto',padding:'2px 5px',fontSize:'.66rem',height:'auto'}});
        S.users.filter(u=>u.active).forEach(u=>{const o=el('option');o.value=u.name;o.textContent=u.name;if(u.name===assignee)o.selected=true;asel.appendChild(o);});
        asel.onchange=e=>{const prev=txn.taskAssignees?.[task.id]||task.assignee;txn.taskAssignees=txn.taskAssignees||{};txn.taskAssignees[task.id]=e.target.value;updateTxn({...txn});if(e.target.value!==prev)notifyTaskAssigned(e.target.value,task.task,computeTaskDueDate(txn,task),txn.address.split(',')[0]);};
        const dinp=el('input',{'class':'fi','type':'date','style':{width:'auto',padding:'2px 5px',fontSize:'.66rem',height:'auto'}});
        const override=txn.taskDueDates?.[task.id]||'';
        dinp.value=override||dueDate||'';
        dinp.onchange=e=>{txn.taskDueDates=txn.taskDueDates||{};txn.taskDueDates[task.id]=e.target.value;updateTxn({...txn});};
        meta.appendChild(asel);meta.appendChild(dinp);
        if(dueDate){const dt=el('span',{'class':'dtag '+(isOvr(dueDate)?'dov':isUrg(dueDate)?'dsn':'dok')});dt.textContent=isOvr(dueDate)?Math.abs(du)+'d over':du===0?'Today':du===1?'Tomorrow':du+'d';meta.appendChild(dt);}
        mid.appendChild(lbl);mid.appendChild(meta);
        const acts=el('div',{'style':{display:'flex',gap:'3px'}});
        if(!isDone){
          acts.appendChild(btn('📧','bg bxs',()=>showEmail(txn.client1Email||'','Reminder: '+task.task,'Hi '+(txn.client1Name||'').split(' ')[0]+',\n\nReminder: "'+task.task+'" is coming up soon.\n\n'+txn.address+'\n\nBest,\n'+(txn.agents?.[0]||''))));
          acts.appendChild(btn('💬','bg bxs',()=>showSMS(txn.client1Phone||'','Hi '+((txn.client1Name||'').split(' ')[0]||'there')+', reminder: '+task.task+' — '+txn.address)));
        }
        row.appendChild(cb2);row.appendChild(mid);row.appendChild(acts);grp.appendChild(row);
      });
    }
    div.appendChild(grp);
  });
  return div;
}

function renderOffersTab(txn){
  const div=el('div');
  const hdr=el('div',{'style':{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}});
  hdr.innerHTML='<div class="sec-title" style="margin-bottom:0">💰 Offers</div>';

  hdr.appendChild(addBtn);div.appendChild(hdr);
  const offers=txn.offers||[];
  if(!offers.length){
    const e=el('div',{'class':'empty'});e.innerHTML='<div class="ei">💰</div><p>No offers yet.<br>Add the first offer to start comparing.</p>';div.appendChild(e);return div;
  }
  // Summary stat row
  const stats=el('div',{'style':{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',marginBottom:'16px'}});
  const prices=offers.map(o=>Number((o.price||'0').replace(/[^0-9.]/g,''))).filter(Boolean);
  const accepted=offers.filter(o=>o.status==='accepted');
  function miniStat(label,val,color){
    const s=el('div',{'style':{background:'var(--white)',border:'1px solid var(--b2)',borderRadius:'10px',padding:'12px',textAlign:'center',boxShadow:'var(--shadow)'}});
    s.innerHTML=`<div style="font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text4);margin-bottom:4px">${label}</div><div style="font-size:1.1rem;font-weight:800;color:${color||'var(--navy)'}">${val}</div>`;
    return s;
  }
  stats.appendChild(miniStat('Total Offers',offers.length));
  stats.appendChild(miniStat('Highest',prices.length?'$'+Math.max(...prices).toLocaleString():'—','var(--green)'));
  stats.appendChild(miniStat('Lowest',prices.length?'$'+Math.min(...prices).toLocaleString():'—','var(--coral)'));
  stats.appendChild(miniStat('Accepted',accepted.length,accepted.length?'var(--green)':'var(--text3)'));
  div.appendChild(stats);
  // Offer cards
  const statusColor={active:'var(--sky)',accepted:'var(--green)',rejected:'#dc2626',countered:'var(--amber)',backup:'var(--purple)'};
  const sortedOffers=[...offers].sort((a,b)=>{
    const pa=Number((a.price||'0').replace(/[^0-9.]/g,''));
    const pb=Number((b.price||'0').replace(/[^0-9.]/g,''));
    return pb-pa;
  });
  sortedOffers.forEach((offer,idx)=>{
    const price=Number((offer.price||'0').replace(/[^0-9.]/g,''));
    const card=el('div',{'style':{background:'var(--white)',border:'2px solid '+(offer.status==='accepted'?'var(--green)':offer.status==='rejected'?'rgba(220,38,38,.2)':'var(--b2)'),borderRadius:'12px',padding:'16px',marginBottom:'10px',boxShadow:'var(--shadow)',transition:'all .15s'}});
    // Card header
    const cardHdr=el('div',{'style':{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px'}});
    const rankBadge=el('div',{'style':{width:'28px',height:'28px',borderRadius:'50%',background:idx===0?'var(--gold)':'var(--bg3)',color:idx===0?'#fff':'var(--text3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.75rem',fontWeight:'800',flexShrink:'0'}});
    rankBadge.textContent='#'+(idx+1);
    const priceEl=el('div',{'style':{fontFamily:"'Sora',sans-serif",fontSize:'1.3rem',fontWeight:'700',color:'var(--navy)'}});
    priceEl.textContent=price?'$'+price.toLocaleString():'No price';
    const statusSel=el('select',{'style':{fontSize:'.68rem',fontWeight:'700',padding:'3px 8px',borderRadius:'100px',border:'1.5px solid '+(statusColor[offer.status]||'var(--b2)'),color:statusColor[offer.status]||'var(--text3)',background:'transparent',cursor:'pointer',outline:'none'}});
    ['active','accepted','rejected','countered','backup'].forEach(s=>{
      const o=el('option');o.value=s;o.textContent=s.charAt(0).toUpperCase()+s.slice(1);if(s===offer.status)o.selected=true;statusSel.appendChild(o);
    });
    statusSel.onchange=e=>{
      const updated={...txn,offers:txn.offers.map(o=>o.id===offer.id?{...o,status:e.target.value}:o)};
      updateTxn(updated);
      logActivity(txn.id,'offer','Offer status changed to '+e.target.value+': '+(offer.agentName||'Unknown agent'));
    };
    const hdrLeft=el('div',{'style':{display:'flex',alignItems:'center',gap:'10px'}});
    hdrLeft.appendChild(rankBadge);hdrLeft.appendChild(priceEl);
    const hdrRight=el('div',{'style':{display:'flex',gap:'6px',alignItems:'center'}});
    hdrRight.appendChild(statusSel);
    hdrRight.appendChild(btn('✏️','bg bxs',()=>showOfferModal(txn,offer)));
    hdrRight.appendChild(btn('🗑','bdanger bxs',()=>{if(confirm('Remove this offer?')){const updated={...txn,offers:txn.offers.filter(o=>o.id!==offer.id)};updateTxn(updated);logActivity(txn.id,'offer','Offer removed: '+(offer.agentName||'Unknown'));};}));
    cardHdr.appendChild(hdrLeft);cardHdr.appendChild(hdrRight);card.appendChild(cardHdr);
    // Field grid
    const grid=el('div',{'style':{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}});
    function offerField(label,val,highlight){
      if(!val)return;
      const f=el('div',{'style':{background:'var(--bg3)',borderRadius:'8px',padding:'8px 10px'}});
      f.innerHTML=`<div style="font-size:.58rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text4);margin-bottom:2px">${label}</div><div style="font-size:.82rem;font-weight:${highlight?'700':'500'};color:${highlight?'var(--navy)':'var(--text2)'}">${val}</div>`;
      grid.appendChild(f);
    }
    offerField('Agent Presenting',offer.agentName);
    offerField('Loan Type',offer.loanType);
    offerField('Lender',offer.lender);
    offerField('Down Payment',offer.downPayment+(offer.downPaymentType==='pct'?'%':' ('+( offer.downPayment?'$'+Number(offer.downPayment).toLocaleString():'')+')'));
    offerField('Earnest Money',offer.earnestMoney?'$'+Number((offer.earnestMoney||'0').replace(/[^0-9.]/g,'')).toLocaleString():'');
    offerField('Closing Date',fmtD(offer.closingDate));
    offerField('Commission',offer.commission);
    if(offer.misc)offerField('Notes',offer.misc);
    card.appendChild(grid);
    div.appendChild(card);
  });
  return div;
}

    dpInp.oninput=e=>{data.downPayment=e.target.value;};

  },f=>{

      const offers=isNew?[...(txn.offers||[]),data]:txn.offers.map(o=>o.id===data.id?data:o);

      logActivity(txn.id,'offer',(isNew?'Offer added: ':'Offer updated: ')+(data.agentName||'Unknown agent')+' — '+(data.price||'no price'),data.loanType||'');

}

  if(allTags.length){const tw=el('div',{'style':{marginBottom:'8px'}});tw.innerHTML='<div style="font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px">Tags</div>';const tr=el('div');allTags.forEach(t=>{const b=el('span',{'class':'badge bph','style':{marginRight:'3px',marginBottom:'3px'}});b.textContent=t;tr.appendChild(b);});tw.appendChild(tr);body.appendChild(tw);}
  if(c.notes){row('Notes',c.notes);}

  const linked=S.transactions.filter(t=>t.client1Email===c.email||t.client2Email===c.email||(c.phone&&(t.client1Phone===c.phone||t.client2Phone===c.phone)));

      r.appendChild(tb);r.appendChild(ta2);lw.appendChild(r);
    });

  panel.appendChild(body);return panel;

function renderCalendar(){
  const div=el('div',{'class':'content'});
  const cal=S.calMonth;const year=cal.getFullYear(),month=cal.getMonth();
  const top=el('div',{'style':{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}});
  const title=el('div',{'style':{fontFamily:"'Sora',sans-serif",fontSize:'1.3rem',fontWeight:'700'}});
  title.textContent=cal.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const nav=el('div',{'style':{display:'flex',gap:'7px',alignItems:'center'}});
  nav.appendChild(btn('← Prev','bg bsm',()=>setState({calMonth:new Date(year,month-1,1)})));
  nav.appendChild(btn('Today','bg bsm',()=>setState({calMonth:new Date(TODAY.getFullYear(),TODAY.getMonth(),1)})));
  nav.appendChild(btn('Next →','bg bsm',()=>setState({calMonth:new Date(year,month+1,1)})));
  nav.appendChild(btn('+ Add Event','bp bsm',()=>showAddEventModal()));
  top.appendChild(title);top.appendChild(nav);div.appendChild(top);
  // Legend
  const leg=el('div',{'style':{display:'flex',gap:'10px',marginBottom:'12px',flexWrap:'wrap'}});
  [['er','Closing'],['ego','EM / Deadlines'],['eb','Inspection / Appraisal'],['eg','Contract'],['ep','Custom Event']].forEach(([cls,lbl])=>{
    const it=el('div',{'style':{display:'flex',alignItems:'center',gap:'4px'}});
    const dot=el('span',{'class':'cev '+cls,'style':{padding:'2px 6px'}});dot.textContent=lbl;it.appendChild(dot);leg.appendChild(it);
  });
  div.appendChild(leg);
  const events={};
  S.transactions.forEach(txn=>{
    const add=(d,lbl,cls)=>{if(!d)return;const k=d.slice(0,10);if(!events[k])events[k]=[];events[k].push({lbl,cls});};
    const a=txn.address.split(',')[0];
    add(txn.closingDate,'Close: '+a,txn.status==='closed'?'eg':'er');
    add(txn.auctionDate,'Auction: '+a,'er');
    add(txn.emDue,'EM Due: '+a,'ego');
    add(txn.inspectionDate,'Inspect: '+a,'eb');
    add(txn.inspectionRRDue,'R&R Due: '+a,'ego');
    add(txn.appraisalDue,'Appraisal: '+a,'eb');
    add(txn.contractDate,'Contract: '+a,'eg');
  });
  S.customEvents.forEach(ev=>{const k=ev.date;if(!events[k])events[k]=[];events[k].push({lbl:ev.title,cls:'ep'});});
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const prevDays=new Date(year,month,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push({day:prevDays-firstDay+i+1,curr:false});
  for(let i=1;i<=daysInMonth;i++)cells.push({day:i,curr:true});
  while(cells.length<42)cells.push({day:cells.length-firstDay-daysInMonth+1,curr:false});
  const todayStr=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-${String(TODAY.getDate()).padStart(2,'0')}`;
  const cg=el('div',{'class':'cal-grid'});
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{const h=el('div',{'class':'cdh'});h.textContent=d;cg.appendChild(h);});
  cells.forEach(cell=>{
    const key=cell.curr?`${year}-${String(month+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}`:null;
    const evs=key?events[key]||[]:[];
    const d=el('div',{'class':'cday'+(key===todayStr?' today':'')+(!cell.curr?' om':'')});
    d.innerHTML=`<div class="cdn">${cell.day}</div>`;
    evs.slice(0,3).forEach(e=>{const ev=el('div',{'class':'cev '+e.cls});ev.title=e.lbl;ev.textContent=e.lbl;d.appendChild(ev);});
    if(evs.length>3){const m=el('div',{'class':'cev','style':{color:'var(--muted)'}});m.textContent='+'+(evs.length-3)+' more';d.appendChild(m);}
    if(key){d.ondblclick=()=>showAddEventModal(key);}
    cg.appendChild(d);
  });
  div.appendChild(cg);
  // Custom events list
  if(S.customEvents.length){
    const st=el('div',{'class':'sec-title','style':{marginTop:'20px'}});st.textContent='📌 Scheduled Events';div.appendChild(st);
    S.customEvents.sort((a,b)=>a.date>b.date?1:-1).forEach(ev=>{
      const r=el('div',{'class':'tr2'});
      r.innerHTML=`<div class="tbar tbm"></div><div style="flex:1"><div style="font-weight:500;color:var(--white);font-size:.83rem">${ev.title}</div><div style="font-size:.7rem;color:var(--muted)">${fmtD(ev.date)}${ev.desc?' · '+ev.desc:''}</div></div>`;
      const rb=btn('🗑','bdanger bxs',()=>{S.customEvents=S.customEvents.filter(e=>e.id!==ev.id);saveState();render();});
      r.appendChild(rb);div.appendChild(r);
    });
  }
  return div;
}

function renderTasks(){
  const div=el('div',{'class':'content'});
  const top=el('div',{'style':{display:'flex',gap:'9px',marginBottom:'16px',alignItems:'center',flexWrap:'wrap'}});
  top.appendChild(el('div',{'style':{flex:'1',fontFamily:"'Sora',sans-serif",fontSize:'.98rem',fontWeight:'600'}},'Team Tasks'));
  const us=el('select',{'class':'fi','style':{width:'auto'}});
  [['all','All Members'],...S.users.filter(u=>u.active).map(u=>[u.name,u.name])].forEach(([v,l])=>{const o=el('option');o.value=v;o.textContent=l;if(v===S.taskUser)o.selected=true;us.appendChild(o);});
  us.onchange=e=>setState({taskUser:e.target.value});top.appendChild(us);div.appendChild(top);
  const allTasks=[];
  S.transactions.filter(t=>t.status==='active').forEach(txn=>{
    const phases=S.phases[txn.type]||[];
    const curPhaseIdx=phases.indexOf(txn.phase);
    // Only show tasks from current phase and earlier (not future phases)
    Object.entries(S.templates[txn.type]||{}).forEach(([phase,tasks])=>{
      const phaseIdx=phases.indexOf(phase);
      // Skip phases that haven't started yet (after current phase)
      if(phaseIdx>curPhaseIdx)return;
      tasks.forEach(task=>{
        const assignee=txn.taskAssignees?.[task.id]||task.assignee;
        const dueDate=computeTaskDueDate(txn,task);
        if(!txn.completedTasks.includes(task.id)&&(S.taskUser==='all'||assignee===S.taskUser))
          allTasks.push({...task,assignee,dueDate,phase,addr:txn.address.split(',')[0],txnId:txn.id});
      });
    });
  });
  allTasks.sort((a,b)=>{if(!a.dueDate&&!b.dueDate)return 0;if(!a.dueDate)return 1;if(!b.dueDate)return -1;return new Date(a.dueDate)-new Date(b.dueDate);});
  const dueSoon=allTasks.filter(t=>t.dueDate&&daysUntil(t.dueDate)<=3);
  const upcoming=allTasks.filter(t=>t.dueDate&&daysUntil(t.dueDate)>3&&daysUntil(t.dueDate)<=14);
  const noDue=allTasks.filter(t=>!t.dueDate);
  const sg=el('div',{'style':{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'11px',marginBottom:'18px'}});
  function msc(cls,l,v){const c=el('div',{'class':'sc '+cls,'style':{padding:'12px 14px'}});c.innerHTML=`<div class="sl">${l}</div><div class="sv" style="font-size:1.55rem">${v}</div>`;return c;}
  sg.appendChild(msc('sr','Due Soon / Overdue',dueSoon.length));sg.appendChild(msc('sg','Upcoming (4–14d)',upcoming.length));div.appendChild(sg);
  function trow(t){
    const r=el('div',{'class':'tr2'});const du=t.dueDate?daysUntil(t.dueDate):null;
    const bc=isOvr(t.dueDate)?'tbh':isUrg(t.dueDate)?'tbm':t.dueDate?'tbl':'tbn';
    r.innerHTML=`<div class="tbar ${bc}"></div><div style="flex:1"><div style="font-weight:500;color:var(--white);font-size:.83rem">${t.task}</div><div style="font-size:.68rem;color:var(--muted);margin-top:1px">${t.addr} · ${t.phase} · ${t.assignee}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:.73rem;font-weight:600;color:${isOvr(t.dueDate)?'var(--red2)':isUrg(t.dueDate)?'var(--amber)':t.dueDate?'var(--slate2)':'var(--muted)'}">${t.dueDate?(isOvr(t.dueDate)?Math.abs(du)+'d over':du===0?'Today':du===1?'Tomorrow':du+'d'):'-'}</div><div style="font-size:.63rem;color:var(--muted)">${t.assignee}</div></div>`;
    return r;
  }
  if(dueSoon.length){const st=el('div',{'class':'sec-title'});st.textContent='🔴 Due Soon / Overdue';div.appendChild(st);dueSoon.forEach(t=>div.appendChild(trow(t)));}
  if(upcoming.length){const st=el('div',{'class':'sec-title','style':{marginTop:'16px'}});st.textContent='🟡 Upcoming (Next 2 Weeks)';div.appendChild(st);upcoming.forEach(t=>div.appendChild(trow(t)));}
  if(noDue.length){const st=el('div',{'class':'sec-title','style':{marginTop:'16px'}});st.textContent='⚪ No Due Date Set';div.appendChild(st);noDue.slice(0,20).forEach(t=>div.appendChild(trow(t)));}
  if(!allTasks.length){const e=el('div',{'class':'empty'});e.innerHTML='<div class="ei">✅</div><p>No pending tasks!</p>';div.appendChild(e);}
  return div;
}

function renderProduction(){
  const div=el('div',{'class':'content','style':{background:'var(--bg)',minHeight:'100vh',padding:'0',margin:'-16px'}});

  // ── helpers ───────────────────────────────────────────────────────────────
  const today=new Date().toISOString().slice(0,10);
  const todayMonth=today.slice(0,7);
  const todayYear=today.slice(0,4);
  if(!S.dailyActivity)S.dailyActivity={};
  if(!S.dailyActivity[today])S.dailyActivity[today]={};

  const agents=S.users.filter(u=>u.active&&['owner','agent','admin_level'].includes(u.role));
  const selectedAgent=S.agentView||(agents[0]?.name||'');
  const isTeamView = selectedAgent === 'Team';

  function getDayData(agent,date){return(S.dailyActivity[date]||{})[agent]||{calls:0,contacts:0,leads:0,appointments:0,social:0};}
  function setDayData(agent,key,val){
    if(!S.dailyActivity[today])S.dailyActivity[today]={};
    if(!S.dailyActivity[today][agent])S.dailyActivity[today][agent]={calls:0,contacts:0,leads:0,appointments:0,social:0};
    S.dailyActivity[today][agent][key]=Math.max(0,parseInt(val)||0);
    saveState();
    const container=document.getElementById('prod-container');
    if(container){const nd=renderProduction();container.parentNode.replaceChild(nd,container);}
  }

  // Get all-time totals from daily activity
  function getActivityTotals(agent){
    let calls=0,contacts=0,leads=0,appointments=0,days=0;
    Object.values(S.dailyActivity||{}).forEach(d=>{
      const a=d[agent];if(!a)return;days++;
      calls+=a.calls||0;contacts+=a.contacts||0;leads+=a.leads||0;appointments+=a.appointments||0;
    });
    return{calls,contacts,leads,appointments,days};
  }

  function getMonthActivity(agent,ym){
    let calls=0,contacts=0,leads=0,appointments=0;
    Object.entries(S.dailyActivity||{}).forEach(([dt,d])=>{
      if(!dt.startsWith(ym))return;const a=d[agent];if(!a)return;
      calls+=a.calls||0;contacts+=a.contacts||0;leads+=a.leads||0;appointments+=a.appointments||0;
    });
    return{calls,contacts,leads,appointments};
  }

  const closedTxns = agent=>S.transactions.filter(t=>t.status==='closed'&&(t.agents||[]).includes(agent));
  const activeTxns = agent=>S.transactions.filter(t=>t.status==='active'&&(t.agents||[]).includes(agent));
  const closedVol  = txns=>txns.reduce((s,t)=>s+Number((t.contractPrice||'').replace(/[^0-9.]/g,'')||0),0);
  const pipelineVol= txns=>txns.reduce((s,t)=>s+Number((t.contractPrice||t.reserve||'').replace(/[^0-9.]/g,'')||0),0);

  // GCI estimate (3% average)
  const estGCI = vol => vol * 0.03;
  const fmtK = v => v>=1000000?'$'+(v/1000000).toFixed(2)+'M':v>=1000?'$'+Math.round(v/1000)+'K':'$'+Math.round(v);

  // ── CONTAINER ─────────────────────────────────────────────────────────────
  div.id='prod-container';

  // ── TOP HEADER BAR ────────────────────────────────────────────────────────

  const gci=estGCI(cVol);
  const todayData = agent==='Team'

  const monthActivity = agent==='Team'

  const allActivity = agent==='Team'

        return merged;
      })()
    : getActivityTotals(agent);

  // Pacing calculation: day of year / 365
  const dayOfYear=Math.floor((new Date()-new Date(todayYear+'-01-01'))/86400000)+1;
  const pacePct=dayOfYear/365;
  const projUnits=pacePct>0?Math.round(closed.length/pacePct):0;
  const projVol=pacePct>0?Math.round(cVol/pacePct):0;
  const onPace=projUnits>=goal.units;

  // ── ROW 1: Hero KPI cards ─────────────────────────────────────────────────
  const heroRow=el('div',{'style':{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:'12px'}});

  function heroCard(icon,label,value,sub,color,pct){
    const c=el('div',{'style':{background:'var(--white)',borderRadius:'12px',padding:'16px',boxShadow:'0 2px 12px rgba(0,0,0,.06)',borderTop:'4px solid '+color,position:'relative',overflow:'hidden'}});
    c.innerHTML=`
      <div style="position:absolute;right:14px;top:14px;font-size:1.5rem;opacity:.15">${icon}</div>

  const unitPct=Math.min(100,Math.round(closed.length/goal.units*100));
  const volPct=Math.min(100,Math.round(cVol/goal.volume*100));
  heroRow.appendChild(heroCard('🏠','Closed Units',closed.length,'Goal: '+goal.units+' units','#b40101',unitPct));
  heroRow.appendChild(heroCard('💰','Closed Volume',fmtK(cVol),'Goal: '+fmtK(goal.volume),'#c9a84c',volPct));
  heroRow.appendChild(heroCard('✍️','Est. GCI',fmtK(gci),'@ 3% avg commission','#8b5cf6',undefined));
  heroRow.appendChild(heroCard('📋','Active Pipeline',active.length+(active.length===1?' deal':' deals'),fmtK(pVol)+' pipeline value','#0891b2',undefined));
  heroRow.appendChild(heroCard('🎯','Projected Units',projUnits,'at current pace',onPace?'#16a34a':'#f59e0b',undefined));
  heroRow.appendChild(heroCard('📅','Days Worked',allActivity.days||0,'tracked days this year','#6366f1',undefined));
  body.appendChild(heroRow);

  // ── ROW 2: Left = Daily Tracker | Right = Pace gauge ─────────────────────
  const row2=el('div',{'style':{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'18px'}});

  // ─ DAILY ACTIVITY TRACKER ─────────────────────────────────────────────────
  const dayCard=el('div',{'style':{background:'var(--white)',borderRadius:'14px',boxShadow:'0 2px 12px rgba(0,0,0,.06)',overflow:'hidden'}});

  dayHdr.innerHTML=`<div><div style="color:#fff;font-weight:700;font-size:.9rem">📊 Today's Numbers</div><div style="color:rgba(255,255,255,.7);font-size:.68rem;margin-top:1px">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div></div>`;
  dayCard.appendChild(dayHdr);
  const dayBody=el('div',{'style':{padding:'16px'}});

  function dayTracker(key,label,icon,goalKey,color){
    const val=todayData[key]||0;

    const row=el('div',{'style':{marginBottom:'14px'}});

    const topRight=el('div',{'style':{display:'flex',alignItems:'center',gap:'8px'}});
    topRight.appendChild(controls);topRight.appendChild(goalLbl);
    top2.appendChild(topRight);
    row.appendChild(top2);
    const bar=el('div',{'style':{height:'6px',background:'var(--bg3)',borderRadius:'3px',overflow:'hidden'}});
    const fill=el('div',{'style':{height:'100%',width:pct+'%',background:pct>=100?'#16a34a':color,borderRadius:'3px',transition:'width .4s ease'}});

    row.appendChild(status);

  }

  if(agent==='Team'){
    // Team view — show read-only totals, no +/- buttons
    [['📞','Dials / Calls','calls','callsDay','#b40101'],['🤝','Contacts Made','contacts','contactsDay','#0891b2'],['⚡','New Leads','leads','leadsDay','#f59e0b'],['📅','Appointments Set','appointments','appointmentsDay','#8b5cf6'],['📱','Social Posts','social','socialDay','#059669']].forEach(([icon,label,key,goalKey,color])=>{

      dayBody.appendChild(row);

  } else {
    dayBody.appendChild(dayTracker('calls','Dials / Calls','📞','callsDay','#b40101'));

  paceCard.appendChild(paceHdr);
  const paceBody=el('div',{'style':{padding:'16px',flex:'1'}});

  // Year ring progress

      <circle cx="${ringSize/2}" cy="${ringSize/2}" r="${r}" fill="none" stroke="${ringPct>=100?'#16a34a':'#c9a84c'}" stroke-width="${stroke}" stroke-dasharray="${circ}" stroke-dashoffset="${circ-(circ*ringPct/100)}" stroke-linecap="round"/>

      <div style="font-size:.6rem;color:#888;font-weight:600">VOLUME</div>

  function paceBar(label,actual,projected,goal2,unit,color){

    return row;

  paceBody.appendChild(paceBar('Volume',cVol,projVol,goal.volume,'$','#b40101'));

  paceBody.appendChild(paceBar('Agreements',closed.length+active.length,Math.round((closed.length+active.length)/pacePct)||0,goal.agreements,'','#f59e0b'));

  paceCard.appendChild(paceBody);
  row2.appendChild(paceCard);
  body.appendChild(row2);

  const row3=el('div',{'style':{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'18px'}});

  // ─ KPI SCORECARD (MAPS-style) ─────────────────────────────────────────────
  const kpiCard=el('div',{'style':{background:'var(--white)',borderRadius:'14px',boxShadow:'0 2px 12px rgba(0,0,0,.06)',overflow:'hidden'}});
  const kpiHdr=el('div',{'style':{background:'linear-gradient(90deg,#7c3aed,#5b21b6)',padding:'14px 18px'}});
  kpiHdr.innerHTML='<div style="color:#fff;font-weight:700;font-size:.9rem">⚡ KPI Scorecard</div><div style="color:rgba(255,255,255,.6);font-size:.68rem;margin-top:1px">Key Performance Indicators — YTD</div>';
  kpiCard.appendChild(kpiHdr);
  const kpiBody=el('div',{'style':{padding:'0'}});

  function kpiRow(label,actual,goal2,unit,format){
    const pct=goal2?Math.min(999,Math.round(actual/goal2*100)):0;
    const status=pct>=100?'✅':pct>=75?'🟡':pct>=50?'🟠':'🔴';
    const row=el('div',{'style':{display:'grid',gridTemplateColumns:'1fr auto auto auto',alignItems:'center',gap:'10px',padding:'10px 18px',borderBottom:'1px solid var(--b3)'}});
    const fmtV=v=>format==='$'?fmtK(v):format==='%'?(v+'%'):String(v);
    row.innerHTML=`
      <div style="font-size:.78rem;font-weight:600;color:#222">${label}</div>
      <div style="font-size:.82rem;font-weight:700;color:#111;text-align:right">${fmtV(actual)}</div>
      <div style="font-size:.7rem;color:#aaa;text-align:right">/ ${fmtV(goal2)}</div>
      <div style="font-size:.85rem;min-width:24px;text-align:center">${status}</div>`;
    return row;
  }

  kpiBody.appendChild(kpiRow('Closed Units',closed.length,goal.units,'',''));
  kpiBody.appendChild(kpiRow('Closed Volume',cVol,goal.volume,'','$'));
  kpiBody.appendChild(kpiRow('GCI (est.)',Math.round(gci),Math.round(goal.volume*0.03),'','$'));
  kpiBody.appendChild(kpiRow('Active Pipeline',active.length,Math.round(goal.units*0.4),'',''));
  kpiBody.appendChild(kpiRow('Total Appointments',allActivity.appointments,goal.appointments,'',''));
  kpiBody.appendChild(kpiRow('Agreements Written',closed.length+active.length,goal.agreements,'',''));
  kpiBody.appendChild(kpiRow('Total Calls',allActivity.calls,goal.callsDay*250,'',''));
  kpiBody.appendChild(kpiRow('Total Contacts',allActivity.contacts,goal.contactsDay*250,'',''));
  kpiBody.appendChild(kpiRow('Total Leads',allActivity.leads,goal.leadsDay*250,'',''));
  kpiCard.appendChild(kpiBody);
  row3.appendChild(kpiCard);

  // ─ CONVERSION RATIOS ──────────────────────────────────────────────────────
  const convCard=el('div',{'style':{background:'var(--white)',borderRadius:'14px',boxShadow:'0 2px 12px rgba(0,0,0,.06)',overflow:'hidden'}});
  const convHdr=el('div',{'style':{background:'linear-gradient(90deg,#0891b2,#0e7490)',padding:'14px 18px'}});
  convHdr.innerHTML='<div style="color:#fff;font-weight:700;font-size:.9rem">🔄 Conversion Ratios</div><div style="color:rgba(255,255,255,.6);font-size:.68rem;margin-top:1px">Lead → Contact → Appt → Agreement → Close</div>';
  convCard.appendChild(convHdr);
  const convBody=el('div',{'style':{padding:'16px'}});

  // Pipeline funnel
  const funnelSteps=[
    {label:'Total Calls',val:allActivity.calls,color:'#0891b2'},
    {label:'Contacts Made',val:allActivity.contacts,color:'#3b82f6'},
    {label:'Leads Generated',val:allActivity.leads,color:'#f59e0b'},
    {label:'Appointments Set',val:allActivity.appointments,color:'#8b5cf6'},
    {label:'Agreements',val:closed.length+active.length,color:'#b40101'},
    {label:'Closed',val:closed.length,color:'#16a34a'},
  ];
  const maxVal=funnelSteps[0].val||1;
  const funnelEl=el('div',{'style':{marginBottom:'16px'}});
  funnelSteps.forEach((step,i)=>{
    const barPct=Math.min(100,Math.round((step.val/maxVal)*100));
    const convRate=i>0&&funnelSteps[i-1].val>0?Math.round((step.val/funnelSteps[i-1].val)*100):100;
    const row=el('div',{'style':{marginBottom:'8px'}});
    row.innerHTML=`
      <div style="display:flex;justify-content:space-between;margin-bottom:2px">
        <span style="font-size:.72rem;font-weight:600;color:#333">${step.label}</span>
        <span style="font-size:.72rem;font-weight:700;color:${step.color}">${step.val}${i>0?' <span style="color:#aaa;font-weight:400;font-size:.65rem">('+convRate+'% conv.)</span>':''}</span>
      </div>
      <div style="height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${barPct}%;background:${step.color};border-radius:4px;transition:width .5s ease"></div>

    txnTbl.style.cssText='width:100%;border-collapse:collapse;font-size:.78rem';
    txnTbl.innerHTML=`<thead><tr style="background:#f9f9f9"><th style="padding:9px 16px;text-align:left;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:#888">Property</th><th style="padding:9px 12px;text-align:left;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:#888">Type</th><th style="padding:9px 12px;text-align:right;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:#888">Price</th><th style="padding:9px 12px;text-align:right;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:#888">GCI (est.)</th><th style="padding:9px 12px;text-align:left;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:#888">Client</th><th style="padding:9px 16px;text-align:right;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:#888">Closed</th></tr></thead>`;
    const txnTb=el('tbody');
    [...closed].sort((a,b)=>(b.closingDate||'').localeCompare(a.closingDate||'')).forEach((t,i)=>{
