function renderDocuments(){
  const div=el('div',{'class':'content'});
  const top=el('div',{'style':{display:'flex',gap:'9px',marginBottom:'16px',flexWrap:'wrap',alignItems:'center'}});
  const ts=el('select',{'class':'fi','style':{width:'auto'}});
  [['all','All Documents'],['buyer','Buyer Docs'],['seller','Seller Docs'],['auction','Auction Docs'],['both','Buyer & Seller']].forEach(([v,l])=>{const o=el('option');o.value=v;o.textContent=l;if(v===S.docTypeFilter)o.selected=true;ts.appendChild(o);});
  ts.onchange=e=>setState({docTypeFilter:e.target.value});top.appendChild(ts);
  top.appendChild(btn('📋 Create Packet','bgold bsm',()=>showPacketBuilder('')));
  top.appendChild(btn('📎 Upload PDF','bp bsm',()=>showUploadDocModal()));
  div.appendChild(top);
  const filtered=S.documents.filter(d=>S.docTypeFilter==='all'||d.category===S.docTypeFilter);
  if(!filtered.length){
    const e=el('div',{'class':'empty'});
    e.innerHTML='<div class="ei">📄</div><p style="font-size:.93rem;font-weight:600;margin-bottom:8px">No Documents Yet</p><p>Upload a PDF, then click anywhere on the pages<br>to visually place auto-fill fields.</p>';
    const ub=btn('📎 Upload First PDF','bp',()=>showUploadDocModal());ub.style.marginTop='12px';e.appendChild(ub);
    div.appendChild(e);
  } else {
    ['buyer','seller','auction','both'].forEach(cat=>{
      const catDocs=filtered.filter(d=>d.category===cat);
      if(S.docTypeFilter!=='all'&&S.docTypeFilter!==cat)return;
      if(!catDocs.length)return;
      const catLabel={'buyer':'🏠 Buyer Documents','seller':'🏡 Seller Documents','auction':'🔨 Auction Documents','both':'📋 Buyer & Seller Documents'}[cat];
      const st=el('div',{'class':'sec-title'});st.textContent=catLabel;div.appendChild(st);
      catDocs.forEach(doc=>{
        const card=el('div',{'class':'doc-card'});
        const icon=el('div',{'class':'doc-icon'});
        icon.innerHTML=doc.pdfData?'<span style="font-size:1.1rem">📑</span>':'<span style="font-size:1.4rem">📄</span>';
        const info=el('div',{'style':{flex:'1'}});
        const placed=(doc.fields||[]).filter(f=>f.x!==undefined).length;
        const unplaced=(doc.fields||[]).filter(f=>f.x===undefined).length;
        info.innerHTML=`<div style="font-weight:600;color:var(--text1);font-size:.88rem;margin-bottom:3px">${doc.name}</div><div style="font-size:.74rem;color:var(--text3)">${doc.category} · ${doc.pages||'?'} page${doc.pages!==1?'s':''} · ${placed} field${placed!==1?'s':''} placed${unplaced?` · <span style="color:var(--amber)">${unplaced} unplaced</span>`:''}</div>`;
        if((doc.fields||[]).length){
          const fg=el('div',{'style':{display:'flex',gap:'3px',flexWrap:'wrap',marginTop:'5px'}});
          doc.fields.slice(0,6).forEach(f=>{
            const b=el('span',{'class':'badge '+(f.x!==undefined?'ba':'bpend'),'style':{fontSize:'.57rem'}});
            b.textContent=f.label+(f.x!==undefined?' ✓':'');fg.appendChild(b);
          });
          if(doc.fields.length>6){const m=el('span',{'class':'badge bph','style':{fontSize:'.57rem'}});m.textContent='+'+(doc.fields.length-6)+' more';fg.appendChild(m);}
          info.appendChild(fg);
        }
        const acts=el('div',{'style':{display:'flex',flexDirection:'column',gap:'5px'}});
        acts.appendChild(btn('🖊️ Place Fields','bp bxs',()=>showPdfFieldPlacer(doc)));
        acts.appendChild(btn('✏️ Fields','bg bxs',()=>showDocFieldsModal(doc)));
        acts.appendChild(btn('🗑','bdanger bxs',()=>{if(confirm('Delete "'+doc.name+'"?')){S.documents=S.documents.filter(d=>d.id!==doc.id);saveState();render();}}));
        card.appendChild(icon);card.appendChild(info);card.appendChild(acts);div.appendChild(card);
      });
    });
  }
  return div;
}

function showUploadDocModal(){
  let name='',category='buyer',addToTemplates=[];
  let pdfData=null,pdfPageCount=0;
  const {close}=modal('📎 Upload PDF Document',body=>{
    // Name
    body.appendChild(fld('Document Name','name','',(_,v)=>name=v,'text','e.g. Purchase Agreement'));
    // Category
    body.appendChild(sfld('Category','category','buyer',[['buyer','Buyer'],['seller','Seller'],['auction','Auction'],['both','Buyer & Seller']],(_,v)=>category=v));

    // ── Add to Packet Templates ──────────────────────────────────────────
    body.appendChild(el('div',{'class':'divider'}));
    const tplHdr=el('div',{'style':{fontSize:'.66rem',fontWeight:'700',letterSpacing:'.5px',color:'var(--text3)',textTransform:'uppercase',marginBottom:'8px'}});
    tplHdr.textContent='Auto-include in Packet Templates';
    body.appendChild(tplHdr);
    const tplGrid=el('div',{'style':{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'12px'}});
    const tplOptions=[['buyer','🏠 Buyer'],['seller','🏡 Seller'],['auction','🔨 Auction'],['all','✅ All Types']];
    tplOptions.forEach(([val,lbl])=>{
      const pill=el('div',{'style':{padding:'6px 14px',borderRadius:'100px',fontSize:'.72rem',fontWeight:'600',cursor:'pointer',border:'1.5px solid var(--b2)',background:'var(--bg3)',color:'var(--text3)',transition:'all .15s',userSelect:'none'}});
      pill.textContent=lbl;
      pill.onclick=()=>{
        if(val==='all'){
          // Toggle all
          const allSelected=addToTemplates.length===3;
          addToTemplates=allSelected?[]:['buyer','seller','auction'];
        } else {
          if(addToTemplates.includes(val)) addToTemplates=addToTemplates.filter(v=>v!==val);
          else addToTemplates=[...addToTemplates,val];
        }
        // Re-render pills
        tplOptions.forEach(([v2,l2],idx)=>{
          const p=tplGrid.children[idx];
          const active=(v2==='all'&&addToTemplates.length===3)||addToTemplates.includes(v2);
          p.style.background=active?'var(--sky-lt)':'var(--bg3)';
          p.style.color=active?'var(--sky)':'var(--text3)';
          p.style.borderColor=active?'var(--sky-mid)':'var(--b2)';
        });
      };
      tplGrid.appendChild(pill);
    });
    body.appendChild(tplGrid);
    const tplNote=el('div',{'style':{fontSize:'.7rem',color:'var(--text4)',marginBottom:'12px'}});
    tplNote.textContent='Selected types will show this document pre-checked when building a packet for that transaction type.';
    body.appendChild(tplNote);

    // ── PDF Upload ───────────────────────────────────────────────────────
    body.appendChild(el('div',{'class':'divider'}));
    const uploadBox=el('div',{'style':{border:'2px dashed var(--b2)',borderRadius:'10px',padding:'24px',textAlign:'center',cursor:'pointer',marginTop:'4px',transition:'all .15s',background:'var(--bg3)'}});
    uploadBox.innerHTML='<div style="font-size:1.8rem;margin-bottom:8px">📑</div><div style="font-size:.85rem;color:var(--text2);font-weight:600">Click to upload PDF</div><div style="font-size:.72rem;color:var(--text4);margin-top:4px">or drag & drop — max 10MB</div>';
    const fi2=el('input',{'type':'file','accept':'.pdf','style':{display:'none'}});
    const statusEl=el('div',{'style':{marginTop:'10px',fontSize:'.78rem',color:'var(--green)',textAlign:'center',display:'none'}});
    uploadBox.onclick=()=>fi2.click();
    uploadBox.ondragover=e=>{e.preventDefault();uploadBox.style.borderColor='var(--sky)';uploadBox.style.background='var(--sky-lt)';};
    uploadBox.ondragleave=()=>{uploadBox.style.borderColor='var(--b2)';uploadBox.style.background='var(--bg3)';};
    uploadBox.ondrop=e=>{e.preventDefault();uploadBox.style.borderColor='var(--b2)';uploadBox.style.background='var(--bg3)';const f=e.dataTransfer.files[0];if(f)processFile(f);};
    fi2.onchange=e=>{if(e.target.files[0])processFile(e.target.files[0]);};
    function processFile(file){
      if(file.size>12*1024*1024)return alert('File too large (max 10MB)');
      const reader=new FileReader();
      reader.onload=ev=>{
        pdfData=ev.target.result;
        if(window.pdfjsLib){
          pdfjsLib.GlobalWorkerOptions.workerSrc='';
          const src2=pdfData.startsWith('data:')
            ? {data:Uint8Array.from(atob(pdfData.split(',')[1]),c=>c.charCodeAt(0))}
            : pdfData;
          pdfjsLib.getDocument(src2).promise.then(pdf=>{
            pdfPageCount=pdf.numPages;
            uploadBox.innerHTML='<div style="font-size:1.5rem">✅</div><div style="font-size:.78rem;color:var(--green);font-weight:600;margin-top:4px">'+file.name+' loaded</div>';
            statusEl.style.display='block';
            statusEl.textContent=pdf.numPages+' page'+( pdf.numPages!==1?'s':'')+' · Click Create to proceed, then place fields visually';
          }).catch(()=>{
            uploadBox.innerHTML='<div style="font-size:1.5rem">✅</div>';
            statusEl.style.display='block';statusEl.textContent='PDF loaded: '+file.name;
          });
        } else {
          uploadBox.innerHTML='<div style="font-size:1.5rem">✅</div>';
          statusEl.style.display='block';statusEl.textContent='PDF loaded: '+file.name;
        }
      };
      reader.readAsDataURL(file);
    }
    body.appendChild(uploadBox);body.appendChild(fi2);body.appendChild(statusEl);
    const tip=el('div',{'style':{background:'var(--sky-lt)',border:'1px solid var(--sky-mid)',borderRadius:'8px',padding:'10px 13px',fontSize:'.76rem',color:'var(--navy)',marginTop:'12px'}});
    tip.innerHTML='<strong>After creating:</strong> Click <strong>🖊️ Place Fields</strong> on the card to visually drop field pins on your PDF pages.';
    body.appendChild(tip);
  },f=>{
    f.appendChild(btn('Cancel','bg',()=>close()));
    f.appendChild(btn('Create & Place Fields','bp',()=>{
      if(!name)return alert('Enter a document name');
      const doc={
        id:'doc'+Date.now(),name,category,
        fields:[],pages:pdfPageCount||1,
        pdfData:pdfData||null,
        templateTypes:addToTemplates,
        uploadedAt:new Date().toISOString().slice(0,10)
      };
      S.documents=[...S.documents,doc];
      saveState();render();close();
      // Always open placer so user can place fields — PDF or no PDF
      showPdfFieldPlacer(doc);
    }));
  },'mdlg');
}

function applyMergeFields(text, txn){
  if(!text||!txn)return text;
  const fmtDN = v => { if(!v)return '—'; try{return new Date(v+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}catch(e){return v;} };
  return text
    .replace(/{{name1}}/g, txn.client1Name||'')
    .replace(/{{name2}}/g, txn.client2Name||'')
    .replace(/{{address}}/g, txn.address||'')
    .replace(/{{agentName}}/g, txn.agents?.[0]||S.currentUser?.name||'')

function makeICSDate(dateStr, allDay=true){
  if(!dateStr)return '';
  const d=new Date(dateStr+'T12:00:00');
  const pad=n=>String(n).padStart(2,'0');
  if(allDay){
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
  }
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T120000`;
}

function makeICSEvent(summary, dateStr, description, uid){
  const dt=makeICSDate(dateStr,true);
  if(!dt)return '';
  // Calculate next day for DTEND (all-day events need next day)
  const d=new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+1);
  const pad=n=>String(n).padStart(2,'0');
  const dtEnd=`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
  const now=new Date();
  const stamp=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}T${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}Z`;
  return [
    'BEGIN:VEVENT',
    `UID:${uid||('turnkey-'+Date.now()+'@bidwichita.com')}`,
    `DTSTAMP:${stamp}`,
    `DTSTART;VALUE=DATE:${dt}`,
    `DTEND;VALUE=DATE:${dtEnd}`,
    'SUMMARY:'+summary.split(',').join('\\,'),
    'DESCRIPTION:'+(description||'').split(String.fromCharCode(10)).join('\\n').split(',').join('\\,'),
    'BEGIN:VALARM',
    'TRIGGER:-P1D',
    'ACTION:DISPLAY',
    'DESCRIPTION:Reminder: '+summary.split(',').join('\\,'),
    'END:VALARM',
    'END:VEVENT'
  ].join('\r\n');
}


function downloadICS(events, filename){
  const cal=[
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//TurnKey BidWichita//Deal Flow Manager//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    ...events,
    'END:VCALENDAR'
  ].join('\r\n');
  const blob=new Blob([cal],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename||'calendar-events.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function makeGCalLink(title, date, description){
  if(!date)return null;
  const d=new Date(date+'T12:00:00');
  const pad=n=>String(n).padStart(2,'0');
  const fmt=d=>`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
  const next=new Date(d);next.setDate(next.getDate()+1);
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${fmt(d)}/${fmt(next)}&details=${encodeURIComponent(description||'')}`;
}

function showPdfFieldPlacer(docIn){

  function appendFieldChip(f,isPlaced){
    const chip=el('div',{'style':{display:'flex',alignItems:'center',gap:'5px',padding:'5px 8px',borderRadius:'6px',marginBottom:'3px',cursor:'pointer',background:placingField===f.key?'rgba(180,1,1,.25)':isPlaced?'rgba(46,204,138,.07)':'var(--bg3)',border:'1px solid '+(placingField===f.key?'var(--red)':isPlaced?'rgba(46,204,138,.3)':'var(--b2)'),transition:'all .12s'}});
    const dot=el('div',{'style':{width:'7px',height:'7px',borderRadius:'50%',flexShrink:'0',background:placingField===f.key?'var(--red)':isPlaced?'var(--green)':'var(--amber)'}});
    const lbl=el('div',{'style':{flex:'1',fontSize:'.73rem',fontWeight:'500',color:'var(--white)',lineHeight:'1.2'}});lbl.textContent=f.label;
    const hint=el('div',{'style':{fontSize:'.58rem',color:'var(--muted)'}});hint.textContent=isPlaced?'pg '+((f.page)||1):'click to place';
    const inner=el('div',{'style':{flex:'1'}});inner.appendChild(lbl);inner.appendChild(hint);
    chip.appendChild(dot);chip.appendChild(inner);
    if(isPlaced){
      const clr=btn('✕','bdanger bxs',e=>{e.stopPropagation();delete f.x;delete f.y;delete f.page;rebuildLeftPanel();renderFieldOverlay();updateStatus();});
      chip.appendChild(clr);
    }
    chip.onclick=()=>{
      if(placingField===f.key){placingField=null;}else{placingField=f.key;statusTxt.textContent='Click on the PDF to place "'+f.label+'" — then select another field or click placed ✕ to remove.';}
      rebuildLeftPanel();
    };
    leftContent.appendChild(chip);
  }

  // Render field markers on canvas overlay
  function renderFieldOverlay(){
    fieldOverlay.innerHTML='';
    const rect=pdfCanvas.getBoundingClientRect();
    const cw=pdfCanvas.width;const ch=pdfCanvas.height;
    workingFields.filter(f=>f.x!==undefined&&(f.page||1)===currentPage).forEach(f=>{
      const px=(f.x/100)*cw;const py=(f.y/100)*ch;
      const marker=el('div',{'style':{position:'absolute',left:(f.x)+'%',top:(f.y)+'%',transform:'translate(-50%,-50%)',pointerEvents:'auto',cursor:'grab',zIndex:'10',userSelect:'none'}});
      const pin=el('div',{'style':{background:'rgba(59,130,246,.92)',color:'#fff',padding:'3px 8px',borderRadius:'5px',fontSize:'.62rem',fontWeight:'700',whiteSpace:'nowrap',boxShadow:'0 2px 10px rgba(0,0,0,.25)',border:'1px solid rgba(255,255,255,.2)',display:'flex',alignItems:'center',gap:'5px'}});
      pin.innerHTML='<span style="cursor:grab;opacity:.7;font-size:.55rem">✥</span>'+f.label+'<span style="opacity:.55;cursor:pointer;margin-left:2px;font-size:.7rem" data-rm="1">✕</span>';
      marker.appendChild(pin);
      // ── Click ✕ to remove ───────────────────────────────────────────────
      pin.querySelector('[data-rm]').addEventListener('click',e=>{
        e.stopPropagation();
        delete f.x;delete f.y;delete f.page;
        marker.remove();rebuildLeftPanel();updateStatus();
      });
      // ── Drag to reposition freely ───────────────────────────────────────
      let isDragging=false,dragOffX=0,dragOffY=0;
      marker.addEventListener('mousedown',e=>{
        if(e.target.dataset.rm)return;
        e.stopPropagation();e.preventDefault();
        isDragging=true;
        marker.style.cursor='grabbing';
        marker.style.zIndex='999';
        const cr=canvasContainer.getBoundingClientRect();
        const mRect=marker.getBoundingClientRect();
        dragOffX=e.clientX-(mRect.left+mRect.width/2-cr.left);
        dragOffY=e.clientY-(mRect.top+mRect.height/2-cr.top);
        const onMove=ev=>{
          if(!isDragging)return;
          const x=Math.max(0,Math.min(100,((ev.clientX-dragOffX)/cr.width)*100));
          const y=Math.max(0,Math.min(100,((ev.clientY-dragOffY)/cr.height)*100));
          marker.style.left=x+'%';marker.style.top=y+'%';
        };
        const onUp=ev=>{
          if(!isDragging)return;
          isDragging=false;
          marker.style.cursor='grab';marker.style.zIndex='10';
          const x=Math.max(0,Math.min(100,((ev.clientX-dragOffX)/cr.width)*100));
          const y=Math.max(0,Math.min(100,((ev.clientY-dragOffY)/cr.height)*100));
          f.x=Math.round(x*10)/10;f.y=Math.round(y*10)/10;f.page=currentPage;
          document.removeEventListener('mousemove',onMove);
          document.removeEventListener('mouseup',onUp);
          rebuildLeftPanel();updateStatus();
        };
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp);
      });
      // Touch support
      marker.addEventListener('touchstart',e=>{
        if(e.target.dataset.rm)return;
        e.stopPropagation();
        const t=e.touches[0];
        const cr=canvasContainer.getBoundingClientRect();
        const mRect=marker.getBoundingClientRect();
        dragOffX=t.clientX-(mRect.left+mRect.width/2-cr.left);
        dragOffY=t.clientY-(mRect.top+mRect.height/2-cr.top);
        const onTMove=ev=>{
          ev.preventDefault();
          const tt=ev.touches[0];
          const x=Math.max(0,Math.min(100,((tt.clientX-dragOffX)/cr.width)*100));
          const y=Math.max(0,Math.min(100,((tt.clientY-dragOffY)/cr.height)*100));
          marker.style.left=x+'%';marker.style.top=y+'%';
        };
        const onTEnd=ev=>{
          const tt=ev.changedTouches[0];
          const x=Math.max(0,Math.min(100,((tt.clientX-dragOffX)/cr.width)*100));
          const y=Math.max(0,Math.min(100,((tt.clientY-dragOffY)/cr.height)*100));
          f.x=Math.round(x*10)/10;f.y=Math.round(y*10)/10;f.page=currentPage;
          marker.removeEventListener('touchmove',onTMove);
          marker.removeEventListener('touchend',onTEnd);
          rebuildLeftPanel();updateStatus();
        };
        marker.addEventListener('touchmove',onTMove,{passive:false});
        marker.addEventListener('touchend',onTEnd);
      });
      fieldOverlay.appendChild(marker);
    });
  }

  // Click on canvas to place field
  canvasContainer.addEventListener('click',e=>{
    if(!placingField)return;
    const rect=canvasContainer.getBoundingClientRect();
    const xPct=((e.clientX-rect.left)/rect.width)*100;
    const yPct=((e.clientY-rect.top)/rect.height)*100;
    const f=workingFields.find(wf=>wf.key===placingField);
    if(!f)return;
    f.x=Math.round(xPct*10)/10;f.y=Math.round(yPct*10)/10;f.page=currentPage;
    placingField=null;
    statusTxt.textContent='Field placed! Select another field to place.';
    rebuildLeftPanel();renderFieldOverlay();updateStatus();
  });

  // Render a PDF page
  async function renderPage(){
    pageLabel.textContent='Page '+currentPage+' / '+totalPages;
    prevPg.disabled=currentPage<=1;nextPg.disabled=currentPage>=totalPages;
    if(!pdfDoc){
      // No PDF loaded — show placeholder
      const ctx2=pdfCanvas.getContext('2d');
      pdfCanvas.width=600;pdfCanvas.height=780;
      ctx2.fillStyle='#f8f8f8';ctx2.fillRect(0,0,600,780);
      ctx2.fillStyle='#ccc';ctx2.font='16px Arial';ctx2.textAlign='center';
      ctx2.fillText('No PDF uploaded — fields will still be saved',300,390);
      ctx2.fillText('Upload a PDF to see visual placement',300,415);
      renderFieldOverlay();rebuildLeftPanel();updateStatus();return;
    }
    try {
      const page=await pdfDoc.getPage(currentPage);
      const viewport=page.getViewport({scale});
      pdfCanvas.width=viewport.width;pdfCanvas.height=viewport.height;
      const ctx2=pdfCanvas.getContext('2d');
      await page.render({canvasContext:ctx2,viewport}).promise;
    } catch(e){console.warn('PDF render error',e);}
    renderFieldOverlay();rebuildLeftPanel();updateStatus();
  }

  function rebuildUI(){
    // Rebuild tab styling
    tabBar.querySelectorAll('div').forEach((t,i)=>{
      const id=i===0?'place':'manage';
      t.style.background=activeTab===id?'var(--red)':'transparent';
      t.style.color=activeTab===id?'#fff':'var(--text3)';
    });
    rebuildLeftPanel();
  }

  // Init: load PDF if available
  async function init(){
    const doc=getDoc();
    if(doc.pdfData&&window.pdfjsLib){
      try {
        pdfjsLib.GlobalWorkerOptions.workerSrc='';
        const pdfSrc=doc.pdfData.startsWith('data:')
          ? {data:Uint8Array.from(atob(doc.pdfData.split(',')[1]),c=>c.charCodeAt(0))}
          : doc.pdfData;
        pdfDoc=await pdfjsLib.getDocument(pdfSrc).promise;
        totalPages=pdfDoc.numPages;
        // Update stored page count
        S.documents=S.documents.map(d=>d.id===doc.id?{...d,pages:totalPages}:d);
      } catch(e){console.warn('PDF load error',e);}
    }
    await renderPage();
  }
  init();
}

}

function printPacket(docs,data){
  const win=window.open('','_blank');
  if(!win)return alert('Please allow pop-ups to print.');

  // Build the HTML for docs without PDF (field table) — PDF docs get canvas rendering
  const tableRows=docs.map(doc=>{
    const fields=(doc.fields||[]).map(f=>`<tr><td style="padding:7px 12px;font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px;width:200px;vertical-align:top;border-bottom:1px solid #eee">${f.label}</td><td style="padding:7px 12px;font-size:13px;color:#111;border-bottom:1px solid #eee">${resolveFieldValue(f.key,data)||'<span style="color:#ccc">__________________________</span>'}</td></tr>`).join('');
    return {doc, html:`<div style="margin-bottom:28px;page-break-inside:avoid"><div style="background:#b40101;color:white;padding:10px 16px;display:flex;justify-content:space-between;align-items:center"><span style="font-family:serif;font-size:15px;font-weight:700">${doc.name}</span><span style="font-size:11px;opacity:.8">${doc.category}</span></div><table style="width:100%;border-collapse:collapse;border:1px solid #e5e5e5;border-top:none">${fields||'<tr><td colspan="2" style="padding:12px;color:#aaa;font-size:12px;font-style:italic">No fields configured.</td></tr>'}</table></div>`};
  });

  win.document.write(`<!DOCTYPE html><html><head><title>Packet — ${data.address||'Property'}</title>
  <scr' + 'ipt src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></scr' + 'ipt>
  <style>
    body{font-family:Arial,sans-serif;margin:0;padding:24px;background:#fff;color:#111}
    .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:12px;border-bottom:3px solid #b40101}
    .pdf-page-wrap{position:relative;display:inline-block;margin-bottom:12px;page-break-after:always;width:100%}
    .pdf-page-wrap canvas{width:100%;height:auto;display:block;box-shadow:0 2px 12px rgba(0,0,0,.15)}
    .field-overlay{position:absolute;inset:0;pointer-events:none}
    .field-label{position:absolute;transform:translate(-50%,-50%);background:rgba(180,1,1,.88);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 1px 6px rgba(0,0,0,.3)}
    @media print{body{padding:8px}.no-print{display:none}.pdf-page-wrap{page-break-after:always}}
  </style></head><body>
  <div class="page-header">
    <div><div style="font-family:serif;font-size:22px;font-weight:700;color:#b40101">TurnKey</div><div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#888;margin-top:2px">Document Packet</div></div>
    <div style="text-align:right"><div style="font-size:14px;font-weight:600">${data.address||'No Address'}</div><div style="font-size:11px;color:#888;margin-top:2px">${data.client1Name||''} · ${new Date().toLocaleDateString()}</div></div>
  </div>
  <div id="docContainer"></div>
  <div class="no-print" style="text-align:center;margin-top:20px;padding:16px;border-top:1px solid #eee">
    <button onclick="window.print()" style="background:#b40101;color:white;border:none;padding:10px 28px;border-radius:6px;font-size:14px;cursor:pointer;font-weight:600">🖨️ Print / Save as PDF</button>
  </div>
  <scr' + 'ipt>
    pdfjsLib.GlobalWorkerOptions.workerSrc='';
    const container=document.getElementById('docContainer');
    const docsData=${JSON.stringify(tableRows.map(r=>({id:r.doc.id,name:r.doc.name,category:r.doc.category,fields:r.doc.fields||[],pdfData:r.doc.pdfData||null,pages:r.doc.pages||1,html:r.html})))};
    const resolvedData=${JSON.stringify({})};
    const transData=${JSON.stringify(data)};

    async function renderAll(){
      for(const doc of docsData){
        if(doc.pdfData){
          // Render PDF pages with field overlays
          try{
            const const pdfSrc=doc.pdfData.startsWith('data:')
          ? {data:Uint8Array.from(atob(doc.pdfData.split(',')[1]),c=>c.charCodeAt(0))}
          : doc.pdfData;
        pdfDoc=await pdfjsLib.getDocument(pdfSrc).promise;
            const secHdr=document.createElement('div');
            secHdr.style='background:#b40101;color:white;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:0;margin-top:20px';
            secHdr.innerHTML='<span style="font-family:serif;font-size:15px;font-weight:700">'+doc.name+'</span><span style="font-size:11px;opacity:.8">'+doc.pages+' page'+( doc.pages!==1?'s':'')+'</span>';
            container.appendChild(secHdr);
            for(let p=1;p<=pdfDoc.numPages;p++){
              const page=await pdfDoc.getPage(p);
              const vp=page.getViewport({scale:1.5});
              const wrap=document.createElement('div');wrap.className='pdf-page-wrap';
              const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;
              await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
              wrap.appendChild(canvas);
              // Add field overlays for this page
              const ov=document.createElement('div');ov.className='field-overlay';
              (doc.fields||[]).filter(f=>f.x!==undefined&&(f.page||1)===p).forEach(f=>{
                const val=transData[f.key]||transData[f.key.replace('buyer1_','client1').replace('seller1_','client1')]||'';
                const lbl=document.createElement('div');lbl.className='field-label';
                lbl.style.left=f.x+'%';lbl.style.top=f.y+'%';
                lbl.textContent=val||('['+f.label+']');
                lbl.style.background=val?'rgba(10,160,80,.9)':'rgba(180,1,1,.88)';
                ov.appendChild(lbl);
              });
              wrap.appendChild(ov);container.appendChild(wrap);
            }
          }catch(e){container.innerHTML+=doc.html;}
        } else {
          container.innerHTML+=doc.html;
        }
      }
    }
    renderAll();
  </scr' + 'ipt>
  <div class="autosave-badge" id="autosave-badge">✓ Saved</div>
</body></html>`);
  win.document.close();
}

function getOnboardingItems(){
  return S.onboardingItems || JSON.parse(JSON.stringify(DEFAULT_ONBOARDING_ITEMS));
}

function renderOnboardingPage(){
  const div=el('div',{'class':'content'});
  const items=getOnboardingItems();
  // Init user progress if not set
  if(!S.currentUser.onboardingProgress) S.currentUser.onboardingProgress={};

  // Header stats
  const total=items.length;
  const completed=Object.values(S.currentUser.onboardingProgress||{}).filter(Boolean).length;
  const pct=Math.round(completed/total*100);

  const heroBanner=el('div',{'style':{background:'linear-gradient(135deg,var(--navy) 0%,#1e4a8a 100%)',borderRadius:'14px',padding:'20px 24px',marginBottom:'20px',display:'flex',alignItems:'center',gap:'20px'}});
  const heroLeft=el('div',{'style':{flex:'1'}});
  heroLeft.innerHTML=`<div style="font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:4px">🎓 Team Onboarding & Training</div><div style="font-size:.82rem;color:rgba(255,255,255,.7);margin-bottom:12px">Complete these items to get fully set up on the TurnKey team. Click any link to open the resource.</div><div style="display:flex;gap:16px"><div style="text-align:center"><div style="font-size:1.5rem;font-weight:800;color:var(--gold)">${completed}</div><div style="font-size:.62rem;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:1px">Completed</div></div><div style="text-align:center"><div style="font-size:1.5rem;font-weight:800;color:#fff">${total-completed}</div><div style="font-size:.62rem;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:1px">Remaining</div></div><div style="text-align:center"><div style="font-size:1.5rem;font-weight:800;color:var(--teal)">${pct}%</div><div style="font-size:.62rem;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:1px">Progress</div></div></div>`;
  // Progress ring
  const ringSize=80;const stroke=6;const r=ringSize/2-stroke;const circ=2*Math.PI*r;
  const heroRight=el('div',{'style':{flexShrink:'0'}});
  heroRight.innerHTML=`<svg width="${ringSize}" height="${ringSize}" viewBox="0 0 ${ringSize} ${ringSize}"><circle cx="${ringSize/2}" cy="${ringSize/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="${stroke}"/><circle cx="${ringSize/2}" cy="${ringSize/2}" r="${r}" fill="none" stroke="var(--teal)" stroke-width="${stroke}" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}" stroke-linecap="round" transform="rotate(-90 ${ringSize/2} ${ringSize/2})"/><text x="${ringSize/2}" y="${ringSize/2+5}" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">${pct}%</text></svg>`;
  heroBanner.appendChild(heroLeft);heroBanner.appendChild(heroRight);div.appendChild(heroBanner);

  // Owner/Ops: manage items + assign button
  const isManager=S.currentUser?.role==='owner'||S.currentUser?.role==='operations';
  if(isManager){
    const mgmtRow=el('div',{'style':{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap'}});
    mgmtRow.appendChild(btn('+ Add Item','bp bsm',()=>showOnboardingItemModal(null)));
    mgmtRow.appendChild(btn('↺ Reset to Defaults','bg bsm',()=>{if(confirm('Reset all onboarding items to defaults? Custom items will be lost.')){S.onboardingItems=null;saveState();render();}}));
    // View other user's progress
    const sel=el('select',{'class':'fi','style':{width:'auto'}});
    const defaultOpt=el('option');defaultOpt.value='';defaultOpt.textContent='View my progress';sel.appendChild(defaultOpt);
    S.users.filter(u=>u.active&&u.id!==S.currentUser.id).forEach(u=>{const o=el('option');o.value=u.id;o.textContent=u.name;sel.appendChild(o);});
    sel.onchange=e=>{setState({onboardingViewUser:e.target.value||null});};
    mgmtRow.appendChild(sel);
    div.appendChild(mgmtRow);
  }

  // Determine whose progress we're viewing
  const viewUserId=isManager&&S.onboardingViewUser?S.onboardingViewUser:S.currentUser.id;
  const viewUser=S.users.find(u=>u.id===viewUserId)||S.currentUser;
  const progress=viewUser.onboardingProgress||{};
  if(viewUserId!==S.currentUser.id){
    const viewBanner=el('div',{'style':{background:'var(--sky-lt)',border:'1px solid var(--sky-mid)',borderRadius:'8px',padding:'10px 14px',fontSize:'.78rem',color:'var(--navy)',marginBottom:'12px'}});
    viewBanner.textContent=`Viewing progress for: ${viewUser.name}`;
    div.appendChild(viewBanner);
  }

  // Group by category
  const cats=[...new Set(items.map(i=>i.category))];
  cats.forEach(cat=>{
    const catItems=items.filter(i=>i.category===cat);
    const catDone=catItems.filter(i=>progress[i.id]).length;
    const catSection=el('div',{'style':{marginBottom:'20px'}});
    const catHdr=el('div',{'style':{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}});
    const catLabel=el('div',{'style':{fontWeight:'700',fontSize:'.78rem',letterSpacing:'1px',textTransform:'uppercase',color:'var(--text4)',display:'flex',alignItems:'center',gap:'8px'}});
    catLabel.textContent=cat;
    const catPct=Math.round(catDone/catItems.length*100);
    const catBadge=el('span',{'style':{fontSize:'.65rem',fontWeight:'700',padding:'2px 8px',borderRadius:'100px',background:catPct===100?'var(--green)':'var(--bg3)',color:catPct===100?'#fff':'var(--text4)'}});
    catBadge.textContent=`${catDone}/${catItems.length}`;
    catLabel.appendChild(catBadge);
    catHdr.appendChild(catLabel);
    catSection.appendChild(catHdr);

    catItems.forEach(item=>{
      const isDone=!!progress[item.id];
      const row=el('div',{'style':{background:'var(--white)',border:'1px solid '+(isDone?'rgba(22,163,74,.2)':'var(--b2)'),borderRadius:'10px',padding:'12px 14px',marginBottom:'6px',display:'flex',gap:'12px',alignItems:'flex-start',transition:'all .15s',boxShadow:'var(--shadow)'}});
      // Checkbox
      const cb=el('div',{'style':{width:'20px',height:'20px',borderRadius:'6px',border:'2px solid '+(isDone?'var(--green)':'var(--b2)'),background:isDone?'var(--green)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:'0',marginTop:'1px',transition:'all .15s'}});
      cb.innerHTML=isDone?'<span style="color:#fff;font-size:.75rem">✓</span>':'';
      cb.onclick=()=>{
        // Only owner/ops can check others' items
        if(viewUserId!==S.currentUser.id && !isManager) return;
        const targetUser=S.users.find(u=>u.id===viewUserId);
        if(!targetUser)return;
        targetUser.onboardingProgress=targetUser.onboardingProgress||{};
        targetUser.onboardingProgress[item.id]=!isDone;
        // Also update currentUser if same
        if(viewUserId===S.currentUser.id)S.currentUser.onboardingProgress=targetUser.onboardingProgress;
        S.users=S.users.map(u=>u.id===targetUser.id?targetUser:u);
        saveState();render();
      };
      const info=el('div',{'style':{flex:'1'}});
      const nameRow=el('div',{'style':{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}});
      const itemName=el('div',{'style':{fontWeight:'600',color:isDone?'var(--text3)':'var(--navy)',fontSize:'.85rem',textDecoration:isDone?'line-through':'none'}});
      itemName.textContent=item.name;
      nameRow.appendChild(itemName);
      if(item.link){
        const lnk=el('a',{'href':item.link,'target':'_blank','style':{fontSize:'.65rem',color:'var(--sky)',fontWeight:'600',textDecoration:'none',padding:'2px 6px',border:'1px solid var(--sky-mid)',borderRadius:'4px',flexShrink:'0'}});
        lnk.textContent='Open ↗';
        nameRow.appendChild(lnk);
      }
      if(item.fileDataUrl&&item.fileName){
        const dlBtn=el('a',{'href':item.fileDataUrl,'download':item.fileName,'style':{fontSize:'.65rem',color:'var(--teal)',fontWeight:'600',textDecoration:'none',padding:'2px 6px',border:'1px solid rgba(0,180,160,.3)',borderRadius:'4px',flexShrink:'0'}});
        dlBtn.textContent='⬇ '+item.fileName.slice(0,20)+(item.fileName.length>20?'...':'');
        nameRow.appendChild(dlBtn);
      }
      info.appendChild(nameRow);
      if(item.desc){const d=el('div',{'style':{fontSize:'.73rem',color:'var(--text4)',marginTop:'3px',lineHeight:'1.5'}});d.textContent=item.desc;info.appendChild(d);}
      row.appendChild(cb);row.appendChild(info);
      // Manager: edit/delete buttons
      if(isManager){
        const acts=el('div',{'style':{display:'flex',gap:'4px',flexShrink:'0'}});
        acts.appendChild(btn('✏️','bg bxs',()=>showOnboardingItemModal(item)));
        acts.appendChild(btn('🗑','bdanger bxs',()=>{if(confirm('Remove this item?')){S.onboardingItems=getOnboardingItems().filter(i=>i.id!==item.id);saveState();render();}}));
        row.appendChild(acts);
      }
      catSection.appendChild(row);
    });
    div.appendChild(catSection);
  });

  // Google Chat: notify team of completion
  if(completed===total&&total>0){
    const congrats=el('div',{'style':{background:'linear-gradient(135deg,var(--green) 0%,var(--teal) 100%)',borderRadius:'12px',padding:'16px 20px',textAlign:'center',marginTop:'8px'}});
    congrats.innerHTML='<div style="font-size:1.3rem">🎉</div><div style="font-weight:700;color:#fff;font-size:.95rem;margin-top:4px">Onboarding Complete!</div><div style="color:rgba(255,255,255,.8);font-size:.75rem;margin-top:4px">Welcome to the TurnKey team.</div>';
    // Notify admin space once (check sessionStorage to avoid repeat fires)
    if(!sessionStorage.getItem('onb-notified-'+S.currentUser.id)){
      sessionStorage.setItem('onb-notified-'+S.currentUser.id,'1');
      notifyTeamSpace('🎓 *Onboarding Complete!*\n'+S.currentUser.name+' has completed all onboarding items. Welcome to the TurnKey team! 🏆',['admin','team']);
    }
    div.appendChild(congrats);
  }
  return div;
}

function showOnboardingItemModal(existing){
  const isNew=!existing;
  const allItems=getOnboardingItems();
  let data=existing?{...existing}:{id:'ob'+Date.now(),category:'TurnKey SOPs',name:'',desc:'',link:'',fileDataUrl:'',fileName:'',assignAll:true};
  const cats=[...new Set(allItems.map(i=>i.category)),'KW Systems','BidWichita','Agent Standards','Compliance'];
  const uniqueCats=[...new Set(cats)];
  const {close}=modal((isNew?'Add':'Edit')+' Onboarding Item',body=>{
    // Category
    const catWrap=el('div',{'class':'fg'});catWrap.appendChild(el('label',{'class':'fl'},'Category'));
    const catRow=el('div',{'style':{display:'flex',gap:'6px'}});
    const catSel=el('select',{'class':'fi','style':{flex:'1'}});
    [...uniqueCats,'+ New Category'].forEach(cat=>{const o=el('option');o.value=cat;o.textContent=cat;if(cat===data.category)o.selected=true;catSel.appendChild(o);});
    catSel.onchange=e=>{if(e.target.value==='+ New Category'){const n=prompt('New category name:');if(n){data.category=n;const o=el('option');o.value=n;o.textContent=n;o.selected=true;catSel.insertBefore(o,catSel.lastChild);}}else data.category=e.target.value;};
    catRow.appendChild(catSel);catWrap.appendChild(catRow);body.appendChild(catWrap);
    body.appendChild(fld('Item Name','name',data.name,(_,v)=>data.name=v,'text','e.g. KW Command Setup'));
    body.appendChild(tfld('Description / Instructions','desc',data.desc,(_,v)=>data.desc=v,2));
    body.appendChild(el('div',{'class':'divider'}));
    // Link
    body.appendChild(fld('External Link (URL)','link',data.link,(_,v)=>data.link=v,'url','https://...'));
    // File upload
    const fupWrap=el('div',{'class':'fg'});
    fupWrap.appendChild(el('label',{'class':'fl'},'Attach a File (PDF, DOC, image — stored in browser)'));
    const fupRow=el('div',{'style':{display:'flex',gap:'8px',alignItems:'center'}});
    const fupInp=el('input',{'type':'file','accept':'.pdf,.doc,.docx,.png,.jpg,.jpeg,.xlsx,.csv'});
    fupInp.style.cssText='flex:1;font-size:.75rem;color:var(--text2)';
    const fupStatus=el('div',{'style':{fontSize:'.72rem',color:'var(--text3)',marginTop:'4px'}});
    if(data.fileName) fupStatus.textContent='Current file: '+data.fileName;
    fupInp.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      if(file.size>5*1024*1024){alert('File must be under 5MB.');fupInp.value='';return;}
      const reader=new FileReader();
      reader.onload=ev=>{data.fileDataUrl=ev.target.result;data.fileName=file.name;fupStatus.textContent='✅ Ready to save: '+file.name;};
      reader.readAsDataURL(file);
    };
    const clearFile=btn('Clear','bg bxs',()=>{data.fileDataUrl='';data.fileName='';fupInp.value='';fupStatus.textContent='No file attached.';});
    fupRow.appendChild(fupInp);if(data.fileName)fupRow.appendChild(clearFile);
    fupWrap.appendChild(fupRow);fupWrap.appendChild(fupStatus);body.appendChild(fupWrap);
  },f=>{
    f.appendChild(btn('Cancel','bg',()=>close()));
    f.appendChild(btn(isNew?'Add Item':'Save','bp',()=>{
      if(!data.name)return alert('Item name required.');
      if(isNew){S.onboardingItems=[...getOnboardingItems(),data];}
      else{S.onboardingItems=getOnboardingItems().map(i=>i.id===data.id?data:i);}
      saveState();close();render();
    }));
  },'mdlg');
}

  ];
  rules.forEach(r=>{
    const row=el('div',{'style':{padding:'5px 0',fontSize:'13px',color:'var(--text2)',borderBottom:'1px solid var(--border)'}});
    row.textContent=r;polBody.appendChild(row);
  });
  polCard.appendChild(polBody);div.appendChild(polCard);

  // Rate limiting card
  const rlCard=el('div',{'class':'card','style':{marginBottom:'16px'}});
  rlCard.innerHTML='<div class="ch"><div class="ct">🛡️ Brute Force Protection</div></div>';
  const rlBody=el('div',{'class':'cb'});
  rlBody.innerHTML='<p style="font-size:13px;color:var(--text2);margin-bottom:8px">Login attempts are rate limited per IP address.</p>';
  const rlStats=el('div',{'style':{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}});
  [[' Max attempts','5 before lockout'],['Lockout duration','15 minutes'],['Auto-reset','After lockout expires'],['Scope','Per IP address']].forEach(([l,v])=>{
    const s=el('div',{'style':{background:'var(--surface2)',borderRadius:'8px',padding:'10px 12px',border:'1px solid var(--border)'}});
    s.innerHTML=`<div style="font-size:10px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">${l}</div><div style="font-size:13px;font-weight:600;color:var(--text1)">${v}</div>`;
    rlStats.appendChild(s);
  });
  rlBody.appendChild(rlStats);rlCard.appendChild(rlBody);div.appendChild(rlCard);

  // Audit log — Owner only
  if(!isOwner){
    const note=el('div',{'style':{background:'var(--amber-lt)',border:'1px solid var(--amber-bd)',borderRadius:'8px',padding:'12px 14px',fontSize:'13px',color:'var(--amber)'}});
    note.textContent='The audit log is visible to Owner accounts only.';
    div.appendChild(note);return div;
  }

  const auditCard=el('div',{'class':'card'});
  const auditHdr=el('div',{'class':'ch'});
  auditHdr.innerHTML='<div class="ct">📋 Login Audit Log</div>';
  const refreshBtn=btn('↻ Refresh','bg bsm',()=>loadAuditLog(auditBody));
  auditHdr.appendChild(refreshBtn);
  auditCard.appendChild(auditHdr);
  const auditBody=el('div',{'class':'cb','style':{padding:'0'}});

  function loadAuditLog(container){
    container.innerHTML='<div style="padding:14px;font-size:12px;color:var(--text4)">Loading...</div>';
    fetch('/api/audit',{headers:authHeaders()}).then(r=>r.json()).then(logs=>{
      container.innerHTML='';
      if(!logs.length){
        container.innerHTML='<div class="empty"><div class="ei">📋</div><p>No activity logged yet.</p></div>';
        return;
      }
      const iconMap={LOGIN_SUCCESS:'✅',LOGIN_FAILED:'❌',LOGIN_BLOCKED:'🚫',LOGOUT:'👋',PASSWORD_RESET:'🔑',PASSWORD_CHANGED:'🔑',USER_CREATED:'👤',USER_UPDATED:'✏️',USER_DELETED:'🗑️'};
      const colorMap={LOGIN_SUCCESS:'var(--green)',LOGIN_FAILED:'var(--red)',LOGIN_BLOCKED:'var(--red)',LOGOUT:'var(--text4)',PASSWORD_RESET:'var(--amber)',PASSWORD_CHANGED:'var(--amber)',USER_CREATED:'var(--sky)',USER_UPDATED:'var(--sky)',USER_DELETED:'var(--red)'};
      logs.forEach(log=>{
        const row=el('div',{'style':{display:'grid',gridTemplateColumns:'28px 1fr auto',gap:'10px',alignItems:'center',padding:'9px 14px',borderBottom:'1px solid var(--border)',fontSize:'12px'}});
        const icon=el('div',{'style':{fontSize:'14px',textAlign:'center'}});icon.textContent=iconMap[log.action]||'📌';
        const info=el('div');
        const action=el('div',{'style':{fontWeight:'600',color:colorMap[log.action]||'var(--text2)'}});
        action.textContent=log.action.replace(/_/g,' ');
        const detail=el('div',{'style':{color:'var(--text3)',marginTop:'1px'}});
        detail.textContent=[log.user_email,log.detail].filter(Boolean).join(' — ');
        info.appendChild(action);info.appendChild(detail);
        const meta=el('div',{'style':{textAlign:'right',color:'var(--text4)',whiteSpace:'nowrap'}});
        const dt=new Date(log.ts+'Z');
        meta.innerHTML=`<div>${dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div><div>${dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div><div style="font-size:10px;margin-top:1px">${log.ip||''}</div>`;
        row.appendChild(icon);row.appendChild(info);row.appendChild(meta);
        container.appendChild(row);
      });
    }).catch(()=>{
      container.innerHTML='<div style="padding:14px;color:var(--red);font-size:12px">Error loading audit log.</div>';
    });
  }

  auditCard.appendChild(auditBody);
  div.appendChild(auditCard);
  loadAuditLog(auditBody);

  // ── Backup & Restore ───────────────────────────────────────────────
  const bakCard=el('div',{'class':'card','style':{marginTop:'16px'}});
  const bakHdr=el('div',{'class':'ch'});
  bakHdr.innerHTML='<div class="ct">💾 Daily Backups</div>';
  const bakRefresh=btn('↻ Refresh','bg bsm',()=>loadBackups(bakBody));
  bakHdr.appendChild(bakRefresh);
  bakCard.appendChild(bakHdr);
  const bakBody=el('div',{'class':'cb','style':{padding:'0'}});

  function loadBackups(container){
    container.innerHTML='<div style="padding:14px;font-size:12px;color:var(--text4)">Loading...</div>';
    fetch('/api/backups',{headers:authHeaders()}).then(r=>r.json()).then(backups=>{
      container.innerHTML='';
      const note=el('div',{'style':{padding:'10px 14px',fontSize:'12px',color:'var(--text3)',borderBottom:'1px solid var(--border)'}});
      note.textContent='Backups run automatically every 24 hours and are kept for 30 days on the server disk.';
      container.appendChild(note);
      if(!backups.length){
        const e=el('div',{'style':{padding:'14px',fontSize:'12px',color:'var(--text4)'}});
        e.textContent='No backups yet — first backup runs at next server startup.';
        container.appendChild(e);return;
      }
      backups.forEach(bk=>{
        const row=el('div',{'style':{display:'flex',alignItems:'center',gap:'12px',padding:'9px 14px',borderBottom:'1px solid var(--border)',fontSize:'12px'}});
        const info=el('div',{'style':{flex:'1'}});
        const fname=el('div',{'style':{fontWeight:'600',color:'var(--text1)'}});
        fname.textContent=bk.filename.replace('backup-','').replace('.json','');
        const detail=el('div',{'style':{color:'var(--text3)',marginTop:'1px'}});
        const m=bk.meta;
        detail.textContent=m.backedUpAt
          ? `${m.transactions||0} transactions · ${m.contacts||0} contacts · ${m.users||0} users · ${new Date(m.backedUpAt).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}`
          : 'Backup file';
        info.appendChild(fname);info.appendChild(detail);
        const restoreBtn=btn('Restore','bdanger bsm',()=>{
          if(!confirm('Restore from '+bk.filename+'?\n\nThis will REPLACE all current data with this backup. A safety backup of current data will be saved first.\n\nAre you sure?'))return;
          restoreBtn.textContent='Restoring...';restoreBtn.disabled=true;
          fetch('/api/backups/restore/'+bk.filename,{method:'POST',headers:authHeaders()})
            .then(r=>r.json())
            .then(d=>{
              if(d.ok){
                alert('✅ Restored successfully from '+bk.filename+'\n\nReloading app...');
                loadAppState().then(()=>render());
              } else {
                alert('❌ Restore failed: '+(d.error||'Unknown error'));
                restoreBtn.textContent='Restore';restoreBtn.disabled=false;
              }
            });
        });
        row.appendChild(info);row.appendChild(restoreBtn);
        container.appendChild(row);
      });
    }).catch(()=>{
      container.innerHTML='<div style="padding:14px;color:var(--red);font-size:12px">Error loading backups.</div>';
    });
  }

  bakCard.appendChild(bakBody);
  div.appendChild(bakCard);
  loadBackups(bakBody);

  return div;
}

function showUserModal(existing){
  const isNew=!existing;
  const isOwner=S.currentUser?.role==='owner';
  const isOps=S.currentUser?.role==='operations'||isOwner;
  let data=existing?{...existing,perms:{...existing.perms}}:{name:'',email:'',password:'',role:'agent',active:true,
    perms:{dashboard:true,transactions:true,contacts:true,calendar:true,tasks:true,marketing:false,production:false,documents:true,settings:false,onboarding:true}};
  const set=(k,v)=>data[k]=v;
  const PAGES=['dashboard','transactions','contacts','calendar','tasks','marketing','production','documents','settings','onboarding'];
  const {close}=modal(isNew?'Add Team Member':'Edit: '+existing?.name,body=>{
    const g=el('div',{'class':'g2'});
    g.appendChild(fld('Full Name','name',data.name,set));
    g.appendChild(fld('Email','email',data.email,set,'email'));
    body.appendChild(g);
    // Password field with strength indicator
    const pwWrap=el('div',{'class':'fg'});
    pwWrap.appendChild(el('label',{'class':'fl'},isNew?'Password':'New Password (leave blank to keep)'));
    const pwInp=el('input',{'class':'fi','type':'password','placeholder':isNew?'8+ chars, 1 uppercase, 1 number':'Leave blank to keep current'});
    const strRow=el('div',{'style':{display:'flex',alignItems:'center',gap:'8px',marginTop:'5px'}});
    const strBar=el('div',{'style':{flex:'1',height:'3px',background:'var(--border)',borderRadius:'100px',overflow:'hidden'}});
    const strFill=el('div',{'style':{height:'3px',borderRadius:'100px',width:'0%',transition:'all .2s'}});
    const strLbl=el('div',{'style':{fontSize:'10px',color:'var(--text4)',minWidth:'44px',textAlign:'right'}});
    strBar.appendChild(strFill);strRow.appendChild(strBar);strRow.appendChild(strLbl);
    pwInp.oninput=e=>{
      const s=passwordStrength(e.target.value);
      const pct=[0,20,40,60,80,100][s.score];
      strFill.style.width=pct+'%';strFill.style.background=s.color;
      strLbl.textContent=s.label;strLbl.style.color=s.color;
      data.password=e.target.value;
    };
    pwWrap.appendChild(pwInp);if(!isNew)pwWrap.appendChild(strRow);
    body.appendChild(pwWrap);
    const g2=el('div',{'class':'g2'});
    g2.appendChild(sfld('Role','role',data.role,[['owner','Owner (full access)'],['operations','Operations'],['agent','Agent'],['admin_level','Admin'],['marketing','Marketing']],set));
    g2.appendChild(sfld('Status','active_str',data.active?'true':'false',[['true','Active'],['false','Inactive']],(_,v)=>data.active=v==='true'));
    body.appendChild(g2);
    body.appendChild(el('div',{'class':'divider'}));
    const webhookFld=fld('Google Chat Webhook URL (personal DMs)','chatWebhook',data.chatWebhook||'',(_,v)=>data.chatWebhook=v,'text','https://chat.googleapis.com/v1/spaces/...');
    const wNote=el('div',{'style':{fontSize:'.68rem',color:'var(--text4)',marginTop:'-8px',marginBottom:'10px'}});wNote.textContent='Paste this user\'s personal Google Chat incoming webhook URL. Leave blank to skip personal notifications.';
    body.appendChild(webhookFld);body.appendChild(wNote);
    body.appendChild(el('div',{'class':'divider'}));
    // Role-based permission presets
    const presetBtn=el('div',{'style':{display:'flex',gap:'6px',marginBottom:'12px',flexWrap:'wrap',alignItems:'center'}});
    const pLabel=el('div',{'style':{fontSize:'.65rem',fontWeight:'700',color:'var(--text4)',letterSpacing:'1px',textTransform:'uppercase',marginRight:'4px'}});pLabel.textContent='Apply preset:';
    presetBtn.appendChild(pLabel);
    const ROLE_PRESETS={
      owner:{dashboard:true,transactions:true,contacts:true,calendar:true,tasks:true,marketing:true,production:true,documents:true,settings:true,onboarding:true},
      operations:{dashboard:true,transactions:true,contacts:true,calendar:true,tasks:true,marketing:true,production:true,documents:true,settings:true,onboarding:true},
      agent:{dashboard:true,transactions:true,contacts:true,calendar:true,tasks:true,marketing:false,production:false,documents:true,settings:false,onboarding:true},
      admin_level:{dashboard:true,transactions:true,contacts:true,calendar:true,tasks:true,marketing:false,production:false,documents:true,settings:false,onboarding:true},
      marketing:{dashboard:true,transactions:false,contacts:false,calendar:true,tasks:true,marketing:true,production:false,documents:false,settings:false,onboarding:false},
    };
    ['owner','operations','agent','admin_level','marketing'].forEach(role=>{
      const pb=btn(roleLabel(role),'bg bxs',()=>{
        data.perms={...ROLE_PRESETS[role]};
        // Re-render toggles
        body.querySelectorAll('.perm-toggle .toggle-sw').forEach((tog,idx)=>{
          const pg=PAGES[idx];if(!pg)return;
          tog.className='toggle-sw'+(data.perms[pg]?' on':'');
        });
      });
      presetBtn.appendChild(pb);
    });
    body.appendChild(presetBtn);
    const permLbl=el('div',{'style':{fontSize:'.67rem',fontWeight:'600',letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--text4)',marginBottom:'10px'}});permLbl.textContent='Page Access Permissions';body.appendChild(permLbl);
    PAGES.forEach(page=>{
      const row=el('div',{'class':'perm-toggle'});
      const tog=el('div',{'class':'toggle-sw'+(data.perms[page]?' on':'')});
      const knob=el('div',{'class':'toggle-knob'});tog.appendChild(knob);
      tog.onclick=()=>{data.perms[page]=!data.perms[page];tog.className='toggle-sw'+(data.perms[page]?' on':'');};
      const lbl=el('span');lbl.textContent=page.charAt(0).toUpperCase()+page.slice(1);
      row.appendChild(tog);row.appendChild(lbl);body.appendChild(row);
    });
  },f=>{
    // Delete — Owner only, not self
    if(!isNew&&isOwner&&S.currentUser?.id!==existing.id){
      f.appendChild(btn('Delete User','bdanger bsm',()=>{
        if(confirm('Permanently delete '+existing.name+'? This cannot be undone.')){
          fetch('/api/users/'+existing.id,{method:'DELETE',headers:authHeaders()}).then(async r=>{
            if(r.ok){
              const ur=await fetch('/api/users',{headers:authHeaders()});
              if(ur.ok) S.users=await ur.json();
              render();close();
            } else {
              const d=await r.json();
              alert(d.error||'Error deleting user.');
            }
          });
        }
      }));
    }
    // Reset Password — Owner/Ops only, not self
    if(!isNew&&isOps&&S.currentUser?.id!==existing.id){
      f.appendChild(btn('Reset Password','bg bsm',()=>{
        const tmpPw=prompt('Set a temporary password for '+existing.name+' (min 8 chars):');
        if(!tmpPw)return;
        if(tmpPw.length<8){alert('Password must be at least 8 characters.');return;}
        fetch('/api/users/'+existing.id+'/reset-password',{
          method:'POST',
          headers:authHeaders(),
          body:JSON.stringify({password:tmpPw})
        }).then(async r=>{
          const d=await r.json();
          if(r.ok){
            // Refresh users from server
            const ur=await fetch('/api/users',{headers:authHeaders()});
            if(ur.ok) S.users=await ur.json();
            render();close();
            alert('Password reset for '+existing.name+'. They will be prompted to change it on next login.');
          } else {
            alert(d.error||'Error resetting password.');
          }
        });
      }));
    }
    f.appendChild(btn('Cancel','bg',()=>close()));
    f.appendChild(btn(isNew?'Create User':'Save Changes','bp',async()=>{
      if(!data.name||!data.email)return alert('Name and email required.');
      if(isNew){
        if(!data.password)return alert('Password required.');
        if(data.password.length<8)return alert('Password must be at least 8 characters.');
        // Server handles hashing
        const r=await fetch('/api/users',{
          method:'POST',
          headers:authHeaders(),
          body:JSON.stringify(data)
        });
        if(!r.ok){const d=await r.json();return alert(d.error||'Error creating user.');}
        const ur=await fetch('/api/users');
        if(ur.ok) S.users=await ur.json();
      } else {
        // Build update payload — include password only if changed
        const payload={...data};
        if(!data.password||data.password.length===0) delete payload.password;
        else if(data.password.length<8) return alert('Password must be at least 8 characters.');
        const r=await fetch('/api/users/'+existing.id,{
          method:'PUT',
          headers:authHeaders(),
          body:JSON.stringify(payload)
        });
        if(!r.ok){const d=await r.json();return alert(d.error||'Error saving user.');}
        const updated=await r.json();
        const ur=await fetch('/api/users');
        if(ur.ok) S.users=await ur.json();
        // Update currentUser if editing self
        if(S.currentUser?.id===existing.id){
          S.currentUser={...S.currentUser,...updated};
        }
      }
      render();close();
    }));
  },'mdlg');
}

function renderForcePasswordChange(){
  const wrap=el('div',{'class':'login-wrap'});
  const card=el('div',{'class':'login-card'});
  const logo=el('div',{'class':'login-logo'});
  logo.innerHTML='<div class="login-brand"><span class="login-brand-icon">🚀</span>Transaction Rocket</div><div class="login-sub" style="margin-top:6px">Password Update Required</div>';
  card.appendChild(logo);
  const warn=el('div',{'style':{background:'var(--amber-lt)',border:'1px solid var(--amber-bd)',borderRadius:'8px',padding:'12px',fontSize:'12px',color:'var(--amber)',marginBottom:'16px',lineHeight:'1.5'}});
  warn.textContent='You are using a default password. Please set a new password before continuing.';
  card.appendChild(warn);
  let newPw='',confirmPw='';
  const errDiv=el('div',{'class':'login-err','style':{display:'none'}});
  card.appendChild(errDiv);
  const pwFld=el('div',{'class':'fg'});
  pwFld.appendChild(el('label',{'class':'fl'},'New Password'));
  const pwInp=el('input',{'class':'fi','type':'password','placeholder':'8+ chars, 1 uppercase, 1 number'});
  // Strength bar
  const strBar=el('div',{'style':{height:'3px',background:'var(--border)',borderRadius:'100px',marginTop:'5px',overflow:'hidden'}});
  const strFill=el('div',{'style':{height:'3px',borderRadius:'100px',width:'0%',transition:'all .2s'}});
  const strLbl=el('div',{'style':{fontSize:'10px',color:'var(--text4)',marginTop:'3px'}});
  strBar.appendChild(strFill);
  pwInp.oninput=e=>{
    newPw=e.target.value;
    const s=passwordStrength(newPw);
    const pct=[0,20,40,60,80,100][s.score];
    strFill.style.width=pct+'%';strFill.style.background=s.color;
    strLbl.textContent=s.label;strLbl.style.color=s.color;
  };
  pwFld.appendChild(pwInp);pwFld.appendChild(strBar);pwFld.appendChild(strLbl);
  card.appendChild(pwFld);
  const cfFld=el('div',{'class':'fg'});
  cfFld.appendChild(el('label',{'class':'fl'},'Confirm Password'));
  const cfInp=el('input',{'class':'fi','type':'password','placeholder':'Repeat new password'});
  cfInp.oninput=e=>{confirmPw=e.target.value;};
  cfFld.appendChild(cfInp);card.appendChild(cfFld);
  const saveBtn=el('button',{'class':'btn bp','style':{width:'100%',justifyContent:'center',marginTop:'6px'}});
  saveBtn.textContent='Set New Password';
  saveBtn.onclick=async()=>{
    if(newPw.length<8){errDiv.textContent='Password must be at least 8 characters.';errDiv.style.display='block';return;}
    if(newPw!==confirmPw){errDiv.textContent='Passwords do not match.';errDiv.style.display='block';return;}
    saveBtn.disabled=true;
    // Try up to 3 times in case session is still settling
    let r, attempts=0;
    while(attempts<3){
      attempts++;
      r=await fetch('/api/users/'+S.currentUser.id+'/change-password',{
        method:'POST',
        headers:authHeaders(),
        body:JSON.stringify({password:newPw})
      });
      if(r.ok||r.status!==401)break;
      // 401 = session not ready yet, wait and retry
      await new Promise(res=>setTimeout(res,600));
    }
    if(r&&r.ok){
      S.currentUser={...S.currentUser,_forcePasswordChange:false};
      await loadAppState();
      render();
    } else {
      const d=r?await r.json():{error:'Connection error'};
      // If still 401 after retries, log them out so they can log back in fresh
      if(r&&r.status===401){
        errDiv.textContent='Session expired — please log in again.';
        errDiv.style.display='block';
        setTimeout(()=>{S.currentUser=null;render();},2000);
      } else {
        errDiv.textContent=d.error||'Error changing password.';
        errDiv.style.display='block';
      }
      saveBtn.disabled=false;
    }
  };
  card.appendChild(saveBtn);
  wrap.appendChild(card);
  return wrap;
}

  const app=document.getElementById('app');app.innerHTML='';
  if(!S.currentUser){app.appendChild(renderLogin());return;}

  else if(S.page==='contacts')content=renderContacts();

  else if(S.page==='marketing'){
    const d=el('div',{'class':'content'});
    d.innerHTML='<div class="sec-title">📣 Marketing Hub</div><p style="font-size:.82rem;color:var(--muted);margin-bottom:16px">Select a listing or auction transaction to manage its marketing plan.</p>';
    const dg=el('div',{'class':'dg'});
    S.transactions.filter(t=>t.status==='active'&&(t.type==='auction'||t.type==='traditional')).forEach(txn=>{

  else{const d=el('div',{'class':'content'});d.innerHTML='<div class="empty"><div class="ei">🚧</div><p>Coming soon</p></div>';content=d;}
  main.appendChild(content);wrap.appendChild(main);app.appendChild(wrap);
}

// ── AUTOSAVE: debounced save on any input/change/blur in the app ─────────────
(function() {
  let _autoTimer = null;
  function autoSave() {
    if (_autoTimer) clearTimeout(_autoTimer);
    _autoTimer = setTimeout(() => { saveState(); }, 600);
  }
  document.addEventListener('input',  e => { if(e.target.closest('.app')) autoSave(); });
  document.addEventListener('change', e => { if(e.target.closest('.app')) autoSave(); });
  document.addEventListener('blur',   e => { if(e.target.closest('.app') && e.target.matches('input,textarea,select')) saveState(); }, true);
  // Also save before the page unloads (tab close / navigate away)
  window.addEventListener('beforeunload', () => saveState());
  window.addEventListener('visibilitychange', () => { if(document.visibilityState === 'hidden') saveState(); });
})();

// ── BACKGROUND SYNC: poll for changes from other team members ────────
(function() {
  let _pollTimer = null;
  let _lastUpdated = null;
  let _isSaving = false;
  let _pollPaused = false;

  // Track when we're saving so we don't overwrite our own save with a poll
  const _origSaveState = saveState;

  // Pause polling while user is actively typing
  document.addEventListener('focusin', e => {
    if(e.target.matches('input,textarea,select')) _pollPaused = true;
  });
  document.addEventListener('focusout', e => {
    if(e.target.matches('input,textarea,select')) {
      // Resume after 3 seconds so the save has time to complete
      setTimeout(() => { _pollPaused = false; }, 3000);
    }
  });

  async function checkForUpdates() {
    // Skip if: not logged in, tab hidden, user is typing, or mid-save
    if(!S.currentUser) return;
    if(document.visibilityState === 'hidden') return;
    if(_pollPaused) return;

    try {
      // Use /api/health to get a lightweight timestamp check
      const r = await fetch('/api/health', { cache: 'no-store' });
      if(!r.ok) return;
      const data = await r.json();

      // Server sends a txn_count + contact_count as a simple change fingerprint
      const fingerprint = data.fingerprint || (data.transactions + '-' + data.contacts);

      if(_lastUpdated === null) {
        // First poll — just record baseline
        _lastUpdated = fingerprint;
        return;
      }

      if(fingerprint !== _lastUpdated) {
        _lastUpdated = fingerprint;
        // Something changed — reload state silently
        await loadAppState();
        // Only re-render if not on a form-heavy modal
        const hasOpenModal = !!document.querySelector('.mo');
        if(!hasOpenModal) {
          render();
          // Show a subtle "Team update" badge instead of "Saved"
          const badge = document.getElementById('autosave-badge');
          if(badge) {
            const orig = badge.textContent;
            badge.textContent = '↻ Updated';
            badge.classList.add('show');
            setTimeout(() => {
              badge.classList.remove('show');
              setTimeout(() => { badge.textContent = orig; }, 300);
            }, 2000);
          }
        }
      }
    } catch(e) {
      // Silent fail — don't bother the user if poll fails
    }
  }

  function schedulePoll() {
    _pollTimer = setTimeout(async () => {
      await checkForUpdates();
      schedulePoll(); // reschedule regardless of outcome
    }, 30000); // 30 seconds
  }

  // Start polling once the app is initialized
  setTimeout(() => {
    if(S.currentUser) {
      // Set initial fingerprint
      fetch('/api/health', { cache: 'no-store' })
        .then(r => r.json())
        .then(d => { _lastUpdated = d.transactions + '-' + d.contacts; })
        .catch(() => {});
      schedulePoll();
    }
  }, 5000); // Wait 5s after load before first poll

  // If user logs in mid-session, start polling then too
  const _origRender = render;
  window._pollStarted = false;
  const _renderWrap = function() {
    _origRender();
    if(S.currentUser && !window._pollStarted) {
      window._pollStarted = true;
      schedulePoll();
    }
    if(!S.currentUser) {
      window._pollStarted = false;
      if(_pollTimer) clearTimeout(_pollTimer);
    }
  };
  // Note: render is called directly so we patch via the poll scheduler above
})();
</script>
